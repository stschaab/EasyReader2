        if (book && book.wiktionary_lang === "es") await ensureSentenceMap();
        const added = addCard(cardEntry, chunks[idx] ? chunks[idx].A1 : null, chunks[idx] ? chunks[idx].id : null);
        if (added) {
          // Popup neu rendern, damit der Entfernen-Button erscheint
          renderDict(lemma, cardEntry, parseInt(dictPopup.style.left), parseInt(dictPopup.style.top));
        }
      });
      // Entfernen-Button im Popup (für Wörter, die schon im Deck sind)
      dictPopup.addEventListener("click", function (e) {
        const btn = e.target.closest(".remove-btn");
        if (!btn) return;
        const lemma = btn.getAttribute("data-remove-lemma");
        if (!lemma) return;
        removeCard(lemma);
        // Popup neu rendern: jetzt ist das Wort weg → zeigt wieder „+ Lernen"
        const entry = dictCache[lemma] || Object.values(dictCache).find(en => en && en.lemma === lemma);
        if (entry) {
          renderDict(lemma, entry, parseInt(dictPopup.style.left), parseInt(dictPopup.style.top));
        } else {
          hidePopup();
        }
      });

      // TTS
      let ttsVoice = null, ttsSpeaking = false, ttsPaused = false;
      function loadVoices() {
        const ttsLang = book ? book.tts_lang : "ru-RU";
        const voices = window.speechSynthesis.getVoices();
        // Bevorzugt: exakte Sprache (z.B. de-DE), sonst Sprachpräfix (z.B. de-AT)
        // Sprachpräfix-Match: schließt Varianten ein, verhindert Fallback auf andere Sprachen
        ttsVoice = voices.find(function (v) { return v.lang === ttsLang; }) ||
                   voices.find(function (v) { return v.lang && v.lang.startsWith(ttsLang.split("-")[0]); });
      }
      loadVoices();
      if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;
      // Chrome-Bug: getVoices() liefert beim App-Start oft ein leeres Array,
      // und onvoiceschanged feuert nicht zuverlässig. Wir pollen mehrfach.
      let voicePollTries = 0;
      const voicePoll = setInterval(function () {
        if (ttsVoice || voicePollTries >= 10) { clearInterval(voicePoll); return; }
        loadVoices();
        voicePollTries++;
      }, 300);

      ttsRate.addEventListener("input", function () { ttsRateVal.textContent = parseFloat(ttsRate.value).toFixed(2) + "×"; });
      ttsAutoplay.addEventListener("change", function () { ttsAutoplayLabel.classList.toggle("active", ttsAutoplay.checked); });

      function startTTS(autoplay) {
        if (!ttsVoice) loadVoices();
        if (!ttsVoice) {
          // Detaillierte Diagnose: welche Stimmen hat der Browser überhaupt?
          if (!autoplay) {
            const voices = window.speechSynthesis.getVoices();
            const ttsLang = book ? book.tts_lang : "ru-RU";
            const langPrefix = ttsLang.split("-")[0];
            const matching = voices.filter(v => v.lang && v.lang.startsWith(langPrefix));
            let msg = "Keine „" + ttsLang + "“ Stimme gefunden.\n\n";
            msg += "Gefundene Stimmen gesamt: " + voices.length + "\n";
            msg += "Davon „" + langPrefix + "“: " + matching.length + "\n\n";
            if (voices.length === 0) {
              msg += "Der Browser hat GAR KEINE Stimmen geladen.\n";
              msg += "→ Häufiger Chrome-Bug: bitte Lade die Seite neu (Strg+F5) und versuche es gleich nochmal.\n";
              msg += "→ Unter Windows: Einstellungen → Zeit & Sprache → Sprache → Stimmen hinzufügen („Deutsch“).\n";
              msg += "→ Chrome braucht evtl. das Modul „Google Deutsch“ aus dem Web Store.";
            } else if (matching.length === 0) {
              msg += "Verfügbare Sprachen: " + [...new Set(voices.map(v => v.lang.split("-")[0]))].sort().join(", ") + "\n\n";
              msg += "→ „" + langPrefix + "“ ist NICHT dabei. Bitte deutsche Sprachstimme im Betriebssystem installieren.";
            } else {
              msg += "Stimmen-Liste:\n" + matching.map(v => "  " + v.name + " (" + v.lang + ")").join("\n");
            }
            alert(msg);
          }
          return false;
        }
        const p = chunks[idx];
        // TTS bei EN-Übersetzung überspringen: englischer Text in spanischer Stimme ergibt keinen Sinn,
        // und wir können keine englische Stimme garantieren.
        if (level === "EN" || level === "EN-A1") {
          if (!autoplay) alert("Vorlesen ist nur für Original und A2 verfügbar, nicht für die englische Übersetzung.");
          return false;
        }
        let text = p.original;
        if (level !== "original" && p[level] && p[level].trim()) text = p[level];
        // Marker ([∞], [C2], [>C2] etc.) vor dem Vorlesen entfernen,
        // sonst liest die Stimme "eckige Klammer" vor
        text = text.replace(/\s\[(?:∞|[ABC][12]|>C2)\]/g, "");
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = book ? book.tts_lang : "ru-RU";
        utter.voice = ttsVoice;
        utter.rate = parseFloat(ttsRate.value);
        utter.volume = 1; utter.pitch = 1;
        utter.onend = function () {
          ttsSpeaking = false; ttsPaused = false;
          ttsBtn.classList.remove("playing"); ttsBtn.textContent = "🔊";
          if (ttsAutoplay.checked && idx < chunks.length - 1) {
            setTimeout(function () { go(1); setTimeout(function () { startTTS(true); }, 300); }, 500);
          }
        };
        utter.onerror = function () {
          ttsSpeaking = false; ttsPaused = false;
          ttsBtn.classList.remove("playing"); ttsBtn.textContent = "🔊";
        };
        window.speechSynthesis.speak(utter);
        ttsSpeaking = true; ttsPaused = false;
        ttsBtn.classList.add("playing"); ttsBtn.textContent = "⏸";
        return true;
      }
      function stopTTS() {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        ttsSpeaking = false; ttsPaused = false;
        ttsBtn.classList.remove("playing"); ttsBtn.textContent = "🔊";
      }
      ttsBtn.addEventListener("click", function () {
        if (!window.speechSynthesis) { alert("TTS nicht unterstützt."); return; }
        if (ttsSpeaking) {
          if (ttsPaused) { window.speechSynthesis.resume(); ttsPaused = false; ttsBtn.textContent = "⏸"; }
          else { window.speechSynthesis.pause(); ttsPaused = true; ttsBtn.textContent = "▶"; }
          return;
        }
        startTTS(false);
      });

      // Start
      async function init() {
        const savedBookId = parseInt(localStorage.getItem(STORAGE_BOOK) || "0", 10);
        if (savedBookId) {
          try { await openBook(savedBookId); return; } catch (e) {}
        }
        loadLibrary();
      }
      init();
    })();
  </script>
</body>
</html>
