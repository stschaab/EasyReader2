<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EasyReader2 — Война и мир</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --card-2: #1c212b;
      --text: #e8e8ea;
      --muted: #9aa0aa;
      --muted-2: #6b717b;
      --accent: #4f8cff;
      --accent-soft: rgba(79, 140, 255, 0.15);
      --border: #262b35;
      --level: #3a4150;
      --ok: #2ecc71;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", "Noto Sans", sans-serif;
      height: 100dvh; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
    }

    .app {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 760px; margin: 0 auto;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    /* --- Buch-Auswahl-Overlay --- */
    .book-select-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 150;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .book-select-overlay.hidden { display: none; }
    .book-select-card { max-width: 420px; width: 100%; }
    .book-select-card h2 { margin: 0 0 0.5rem; font-size: 1.3rem; }
    .book-select-card .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 1.5rem; }
    .book-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.8rem;
      cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; gap: 1rem;
    }
    .book-item:hover { border-color: var(--accent); }
    .book-item:active { transform: scale(0.98); }
    .book-item .cover {
      width: 44px; height: 44px; background: var(--accent-soft); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .book-item .info { flex: 1; }
    .book-item .info .t { font-size: 1.05rem; font-weight: 600; }
    .book-item .info .a { color: var(--muted); font-size: 0.82rem; }
    .book-item .info .meta { color: var(--muted-2); font-size: 0.75rem; margin-top: 2px; }
    .book-loading { text-align: center; color: var(--muted); padding: 2rem; }

    /* --- Kopf --- */
    header {
      padding: 0.9rem 1.1rem 0.6rem; flex-shrink: 0;
      display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap;
    }
    .head-row { display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap; flex: 1; }
    .head-row h1 { margin: 0; font-size: 1.15rem; letter-spacing: -0.01em; }
    .head-row .author { color: var(--muted); font-size: 0.82rem; }
    .library-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 0.3rem 0.6rem; font-size: 1rem; cursor: pointer;
      font-family: inherit;
    }

    /* --- Level-Umschalter --- */
    .levels {
      display: flex; gap: 0.4rem; padding: 0.4rem 1.1rem 0.7rem;
      overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
    }
    .levels::-webkit-scrollbar { display: none; }
    .lvl-btn {
      flex-shrink: 0; padding: 0.45rem 0.9rem;
      background: var(--card); color: var(--muted);
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s ease; font-family: inherit;
    }
    .lvl-btn:hover { color: var(--text); }
    .lvl-btn.active {
      background: var(--accent-soft); color: var(--accent); border-color: var(--accent);
    }

    /* --- Chunk-Anzeige --- */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 0 1.3rem; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .chunk { max-width: 620px; width: 100%; text-align: left; }
    .chunk-nr { color: var(--muted-2); font-size: 0.78rem; margin-bottom: 0.6rem; letter-spacing: 0.04em; }
    .chunk-text {
      font-size: 1.6rem; font-size: clamp(1.3rem, 5.5vw, 1.6rem);
      line-height: 1.72; color: var(--text); hyphens: auto;
      -webkit-text-size-adjust: 100%;
    }
    .chunk-text .word {
      cursor: pointer; border-radius: 4px;
      -webkit-tap-highlight-color: rgba(79, 140, 255, 0.25); transition: background 0.1s;
    }
    .chunk-text .word:active { background: var(--accent-soft); }
    .placeholder { text-align: center; color: var(--muted); padding: 2rem 1rem; }
    .placeholder .icon { font-size: 2rem; display: block; margin-bottom: 0.6rem; opacity: 0.6; }
    .placeholder .pill {
      display: inline-block; padding: 0.2rem 0.7rem;
      background: var(--level); border-radius: 6px; font-size: 0.8rem; margin-top: 0.4rem;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* --- TTS-Bar --- */
    .tts-bar {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.3rem 1.1rem 0.5rem; flex-shrink: 0; flex-wrap: wrap;
    }
    .tts-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 1.1rem; cursor: pointer;
      font-family: inherit; -webkit-tap-highlight-color: transparent; transition: all 0.12s;
    }
    .tts-btn:hover { border-color: var(--accent); }
    .tts-btn.playing { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .tts-speed { display: flex; align-items: center; gap: 0.4rem; color: var(--muted); font-size: 0.8rem; }
    .tts-speed input[type="range"] { width: 80px; accent-color: var(--accent); }
    .tts-speed .val { min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; color: var(--text); }
    .tts-autoplay {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--muted); font-size: 0.82rem; cursor: pointer; user-select: none;
    }
    .tts-autoplay input { accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; }
    .tts-autoplay.active { color: var(--accent); }

    /* --- Footer --- */
    footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem; padding: 0.7rem 1.1rem 1rem; flex-shrink: 0;
    }
    .nav-btn {
      min-width: 64px; padding: 0.7rem 1rem;
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 1rem; cursor: pointer; transition: all 0.12s ease; font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .nav-btn:active:not(:disabled) { transform: scale(0.96); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .counter { color: var(--muted); font-size: 0.88rem; font-variant-numeric: tabular-nums; text-align: center; flex: 1; }
    .counter .now { color: var(--text); font-weight: 600; }
    .counter .ver { display: block; font-size: 0.68rem; color: var(--muted-2); margin-top: 2px; }

    /* --- Pop-up & Diag --- */
    .dict-popup {
      position: fixed; z-index: 100;
      background: var(--card-2); border: 1px solid var(--accent);
      border-radius: 12px; padding: 0.9rem 1.1rem; max-width: 300px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); font-size: 0.95rem; display: none;
    }
    .dict-popup.visible { display: block; }
    .dict-popup .dw { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.3rem; }
    .dict-popup .lemma { font-size: 1.15rem; font-weight: 700; color: var(--accent); }
    .dict-popup .inflected { color: var(--muted); font-size: 0.8rem; }
    .dict-popup .pos { color: var(--muted-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .dict-popup .gloss { color: var(--text); line-height: 1.45; }
    .dict-popup .loading, .dict-popup .err { color: var(--muted); }
    .dict-popup .close-hint { color: var(--muted-2); font-size: 0.7rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Buch-Auswahl -->
    <div class="book-select-overlay" id="book-select-overlay">
      <div class="book-select-card">
        <h2>📚 Bibliothek</h2>
        <p class="sub">Wähle ein Buch zum Lesen</p>
        <div id="book-list">
          <div class="book-loading">Lade Bibliothek…</div>
        </div>
      </div>
    </div>

    <!-- Hauptansicht -->
    <header style="display:none" id="main-header">
      <div class="head-row">
        <h1 id="book-title">…</h1>
        <span class="author" id="book-author"></span>
      </div>
      <button class="library-btn" id="library-btn" aria-label="Bibliothek">📚</button>
    </header>

    <nav class="levels" id="levels" style="display:none"></nav>

    <main>
      <div class="chunk">
        <div class="chunk-nr" id="chunk-nr"></div>
        <div class="chunk-text" id="chunk-text"></div>
      </div>
    </main>

    <div class="tts-bar" id="tts-bar" style="display:none">
      <button class="tts-btn" id="tts-btn" aria-label="Vorlesen">🔊</button>
      <div class="tts-speed">
        <span>Tempo</span>
        <input type="range" id="tts-rate" min="0.5" max="1.5" step="0.05" value="0.8" />
        <span class="val" id="tts-rate-val">0.8×</span>
      </div>
      <label class="tts-autoplay" id="tts-autoplay-label">
        <input type="checkbox" id="tts-autoplay" />
        <span>▶ Autoplay</span>
      </label>
    </div>

    <footer id="main-footer" style="display:none">
      <button class="nav-btn" id="prev" aria-label="Zurück">‹</button>
      <div class="counter" id="counter"></div>
      <button class="nav-btn" id="next" aria-label="Weiter">›</button>
    </footer>
  </div>

  <div class="dict-popup" id="dict-popup"></div>

  <script>
    (function () {
      const VERSION = "5.1";
      const API = "https://easyreader2.st-schaab.workers.dev";
      let LEVELS = ["original", "4000", "3000", "2000", "1000"]; // Default (ältere book-N.json ohne levels-Feld)
      const CEFR_LEVELS = ["A1", "A2", "B1", "B2", "C1", "C2"]; // CEFR-Labels ohne „ W."-Suffix
      const STORAGE_BOOK = "easyreader2.bookId";

      let bookId = null, book = null, chunks = [], idx = 0, level = "original";
      let userId = localStorage.getItem("easyreader2.userId");
      if (!userId) {
        userId = "anon-" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("easyreader2.userId", userId);
      }

      const overlay = document.getElementById("book-select-overlay");
      const bookListEl = document.getElementById("book-list");
      const header = document.getElementById("main-header");
      const titleEl = document.getElementById("book-title");
      const authorEl = document.getElementById("book-author");
      const libraryBtn = document.getElementById("library-btn");
      const levelsEl = document.getElementById("levels");
      const textEl = document.getElementById("chunk-text");
      const nrEl = document.getElementById("chunk-nr");
      const counterEl = document.getElementById("counter");
      const prevBtn = document.getElementById("prev");
      const nextBtn = document.getElementById("next");
      const ttsBar = document.getElementById("tts-bar");
      const ttsBtn = document.getElementById("tts-btn");
      const ttsRate = document.getElementById("tts-rate");
      const ttsRateVal = document.getElementById("tts-rate-val");
      const ttsAutoplay = document.getElementById("tts-autoplay");
      const ttsAutoplayLabel = document.getElementById("tts-autoplay-label");
      const mainFooter = document.getElementById("main-footer");
      const dictPopup = document.getElementById("dict-popup");

      async function apiGet(path) {
        const res = await fetch(API + path, { headers: { "X-User-Id": userId } });
        return res.json();
      }
      async function apiPost(path, body) {
        const res = await fetch(API + path, {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8", "X-User-Id": userId },
          body: JSON.stringify(body),
        });
        return res.json();
      }
      function fetchWithTimeout(url, options, ms) {
        return new Promise(function (resolve, reject) {
          const controller = new AbortController();
          const timer = setTimeout(function () { controller.abort(); reject(new Error("Timeout")); }, ms);
          fetch(url, Object.assign({ signal: controller.signal }, options))
            .then(function (res) { clearTimeout(timer); resolve(res); })
            .catch(function (err) { clearTimeout(timer); reject(err); });
        });
      }

      async function loadLibrary() {
        bookListEl.innerHTML = '<div class="book-loading">Lade Bibliothek…</div>';
        try {
          // Statische Bibliotheks-Datei von GitHub Pages laden
          const res = await fetchWithTimeout("library.json?v=" + VERSION, {}, 10000);
          if (!res.ok) throw new Error("library.json nicht gefunden");
          const data = await res.json();
          bookListEl.innerHTML = "";
          if (!data.books || data.books.length === 0) {
            bookListEl.innerHTML = '<div class="book-loading">Keine Bücher vorhanden.</div>';
            return;
          }
          for (const b of data.books) {
            const item = document.createElement("div");
            item.className = "book-item";
            item.innerHTML =
              '<div class="cover">📖</div>' +
              '<div class="info">' +
              '<div class="t">' + b.title + '</div>' +
              '<div class="a">' + (b.author || "") + '</div>' +
              '<div class="meta">' + (b.lang || "").toUpperCase() + ' · ' + b.chunks + ' Absätze</div>' +
              '</div>';
            item.addEventListener("click", function () { openBook(b.id); });
            bookListEl.appendChild(item);
          }
        } catch (e) {
          bookListEl.innerHTML =
            '<div class="book-loading">' +
            '<p>⚠️ Bibliothek konnte nicht geladen werden</p>' +
            '<p style="font-size:0.8rem;margin-top:0.5rem">' + (e.message || "Netzwerkfehler") + '</p>' +
            '<button class="nav-btn" style="margin-top:1rem" onclick="location.reload()">Erneut versuchen</button>' +
            '</div>';
        }
      }

      async function openBook(id) {
        bookListEl.style.opacity = "0.5";
        bookListEl.style.pointerEvents = "none";

        try {
          // Statische JSON-Datei von GitHub Pages laden (sehr zuverlässig aus Russland)
          // Benennung: book-1.json für Buch mit ID 1
          const dataPath = "book-" + id + ".json?v=" + VERSION;
          const res = await fetchWithTimeout(dataPath, {}, 20000);
          if (!res.ok) throw new Error("Buchdatei nicht gefunden: " + dataPath);
          const data = await res.json();
          book = data.book;
          chunks = data.chunks;
          if (!chunks || chunks.length === 0) { alert("Buch hat keine Absätze."); bookListEl.style.opacity = ""; bookListEl.style.pointerEvents = ""; return; }

          // Level-Liste aus dem Buch übernehmen (neu: book.levels), sonst Default
          if (book.levels && Array.isArray(book.levels) && book.levels.length > 0) {
            LEVELS = book.levels;
          } else {
            LEVELS = ["original", "4000", "3000", "2000", "1000"];
          }

          // Book-Liste wieder aktivieren (für späteren Bibliotheks-Besuch)
          bookListEl.style.opacity = "";
          bookListEl.style.pointerEvents = "";

          bookId = id;
          localStorage.setItem(STORAGE_BOOK, id);

          titleEl.textContent = book.title;
          authorEl.textContent = book.author || "";
          overlay.classList.add("hidden");
          header.style.display = "";
          levelsEl.style.display = "";
          ttsBar.style.display = "";
          mainFooter.style.display = "";

          levelsEl.innerHTML = "";
          LEVELS.forEach(function (lvl) {
            const b = document.createElement("button");
            b.className = "lvl-btn";
            b.dataset.lvl = lvl;
            // Label: "Original" für original; CEFR-Level oder EN als reines Label; sonst "N W."
            let label;
            if (lvl === "original") label = "Original";
            else if (lvl === "EN") label = "EN";
            else if (CEFR_LEVELS.indexOf(lvl) >= 0) label = lvl;
            else label = lvl + " W.";
            b.textContent = label;
            b.addEventListener("click", function () { setLevel(lvl); });
            levelsEl.appendChild(b);
          });

          // Progress laden (optional, localStorage-Fallback)
          idx = 0; level = "original";
          try {
            const saved = await apiGet("/api/progress/" + id);
            if (saved.progress) {
              idx = Math.min(Math.max(saved.progress.chunk_index || 0, 0), chunks.length - 1);
              const savedLvl = saved.progress.level;
              level = LEVELS.includes(savedLvl) ? savedLvl : "original";
            }
          } catch (e) {
            // Fallback: localStorage
            const ls = localStorage.getItem("er2_" + id + "_pos");
            if (ls) { try { const p = JSON.parse(ls); idx = p.idx || 0; level = p.level || "original"; } catch (e2) {} }
          }
          setLevel(level);
          render();
        } catch (e) {
          bookListEl.style.opacity = "";
          bookListEl.style.pointerEvents = "";
          alert("Buch konnte nicht geladen werden: " + (e.message || "Netzwerkfehler"));
        }
      }

      libraryBtn.addEventListener("click", function () {
        overlay.classList.remove("hidden");
        loadLibrary();
      });

      function setLevel(lvl) {
        level = lvl;
        Array.prototype.forEach.call(levelsEl.children, function (b) {
          b.classList.toggle("active", b.dataset.lvl === lvl);
        });
        stopTTS();
        render();
        saveProgress();
      }

      function go(delta) {
        const next = idx + delta;
        if (next < 0 || next >= chunks.length) return;
        idx = next;
        render();
        saveProgress();
      }

      // Progress speichern, aber nicht bei jeder Aktion feuern (entlastet die API)
      let progressTimer = null;
      function saveProgress() {
        if (!bookId) return;
        // Immer lokal sichern (Fallback)
        localStorage.setItem("er2_" + bookId + "_pos", JSON.stringify({ idx: idx, level: level }));
        // Debounced ans API schicken (optional)
        if (progressTimer) clearTimeout(progressTimer);
        progressTimer = setTimeout(function () {
          apiPost("/api/progress", { book_id: bookId, chunk_index: idx, level: level })
            .catch(function () { /* Progress ist optional */ });
        }, 1500);
      }

      function wrapWords(text) {
        const regex = book && book.word_regex ? new RegExp(book.word_regex, "g") : /[А-Яа-яЁё]+/g;
        return text.replace(regex, function (w) { return '<span class="word">' + w + "</span>"; });
      }

      function render() {
        const p = chunks[idx];
        if (!p) return;
        const ref = p.chapter
          ? p.chapter + "  ·  Absatz " + (idx + 1) + " / " + chunks.length
          : "Absatz " + (idx + 1) + " / " + chunks.length;
        nrEl.textContent = ref;

        if (level === "original") {
          textEl.className = "chunk-text";
          textEl.innerHTML = wrapWords(p.original);
        } else if (level === "EN") {
          // Englische Übersetzung: als Klartext ohne anklickbare Wörter (kein Wörterbuch auf EN)
          const val = p.EN;
          if (val && val.trim()) {
            textEl.className = "chunk-text";
            textEl.textContent = val;  // textContent = kein HTML, keine Wraps
          } else {
            textEl.className = "placeholder";
            textEl.innerHTML = '<span class="icon">📖</span>Übersetzung noch nicht generiert.<br><span style="font-size:0.8rem;color:var(--muted-2)">Für diesen Absatz ist nur Original / A2 verfügbar.</span>';
          }
        } else {
          const val = p[level];
          if (val && val.trim()) {
            // Bereits geladen (Cache oder on-demand)
            textEl.className = "chunk-text";
            textEl.innerHTML = wrapWords(val);
          } else if (p._loaded) {
            // Chunk-Daten wurden schon geladen, Level aber leer → ad-hoc generieren
            renderAdHoc(p, level);
          } else {
            // Chunk-Vereinfachungen on-demand vom Server laden
            loadChunkLevels(p);
          }
        }

        counterEl.innerHTML =
          '<span class="now">' + (idx + 1) + '</span> / ' + chunks.length +
          '<span class="ver">v' + VERSION + '</span>';
        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx === chunks.length - 1;
      }

      // Lädt die Vereinfachungen für einen Chunk on-demand vom Server
      function loadChunkLevels(p) {
        textEl.className = "placeholder";
        textEl.innerHTML =
          '<span class="icon" style="display:inline-block;animation:spin 1s linear infinite">⚙️</span>' +
          'Lade Absatz…';

        fetchWithTimeout(API + "/api/chunk/" + p.id, { headers: { "X-User-Id": userId } }, 15000)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) throw new Error(data.error);
            p.C1 = data.C1 || "";
            p.B2 = data.B2 || "";
            p.B1 = data.B1 || "";
            p.A2 = data.A2 || "";
            p._loaded = true;
            if (chunks[idx].id === p.id) render();
          })
          .catch(function (err) {
            if (chunks[idx].id === p.id) {
              textEl.className = "placeholder";
              textEl.innerHTML =
                '<span class="icon">⚠️</span>' +
                'Fehler beim Laden.' +
                '<br><span style="font-size:0.8rem;color:var(--muted-2)">' + (err.message || "") + '</span>' +
                '<br><br><span style="font-size:0.75rem;color:var(--muted-2)">Nochmal tippen/blättern</span>';
            }
          });
      }

      function renderAdHoc(p, lvl) {
        textEl.className = "placeholder";
        textEl.innerHTML =
          '<span class="icon" style="display:inline-block;animation:spin 1s linear infinite">⚙️</span>' +
          'Generiere <strong>' + lvl + '</strong>-Vereinfachung…' +
          '<br><span style="font-size:0.8rem;color:var(--muted-2)">GLM mit RAG · kann 30s dauern</span>';

        fetchWithTimeout(API + "/api/simplify", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8", "X-User-Id": userId },
          body: JSON.stringify({ chunk_id: p.id, level: lvl }),
        }, 60000)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) throw new Error(data.error);
            const text = data.simplified.trim();
            p[lvl] = text;
            if (chunks[idx].id === p.id && level === lvl) {
              textEl.className = "chunk-text";
              textEl.innerHTML = wrapWords(text);
            }
          })
          .catch(function (err) {
            if (chunks[idx].id === p.id && level === lvl) {
              textEl.className = "placeholder";
              const msg = err.message === "Timeout" ? "Zeitüberschreitung." : (err.message || "Fehler");
              textEl.innerHTML =
                '<span class="icon">⚠️</span>' +
                'Fehler bei der Generierung.' +
                '<br><span style="font-size:0.8rem;color:var(--muted-2)">' + msg + '</span>' +
                '<br><br><span style="font-size:0.75rem;color:var(--muted-2)">Nochmal auf ' + lvl + ' tippen</span>';
            }
          });
      }

      prevBtn.addEventListener("click", function () { stopTTS(); go(-1); });
      nextBtn.addEventListener("click", function () { stopTTS(); go(1); });
      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft") go(-1);
        else if (e.key === "ArrowRight") go(1);
      });
      let touchStartX = null, touchStartY = null, swipeActive = false;
      document.addEventListener("touchstart", function (e) {
        touchStartX = e.changedTouches[0].clientX; touchStartY = e.changedTouches[0].clientY; swipeActive = true;
      }, { passive: true });
      document.addEventListener("touchmove", function (e) {
        if (!swipeActive || touchStartX === null) return;
        const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
        const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
        if (dy > dx && dy > 12) swipeActive = false;
      }, { passive: true });
      document.addEventListener("touchend", function (e) {
        if (!swipeActive || touchStartX === null) { swipeActive = false; return; }
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 60) { stopTTS(); go(dx < 0 ? 1 : -1); }
        swipeActive = false; touchStartX = null;
      }, { passive: true });

      // Wort-Übersetzung (gleiche Logik wie SimpleReader)
      const dictCache = {};
      function showPopup(html, x, y) {
        dictPopup.innerHTML = html;
        dictPopup.classList.add("visible");
        const pw = dictPopup.offsetWidth || 280, ph = dictPopup.offsetHeight || 100;
        let left = Math.max(10, Math.min(x - pw / 2, window.innerWidth - pw - 10));
        let top = y - ph - 16; if (top < 10) top = y + 30;
        dictPopup.style.left = left + "px"; dictPopup.style.top = top + "px";
      }
      function hidePopup() { dictPopup.classList.remove("visible"); }
      function stripTags(html) { const d = document.createElement("div"); d.innerHTML = html; return d.textContent || ""; }
      // Wiktionary-Sprachsektion dynamisch aus dem Buch (Default 'ru' für Abwärtskompatibilität)
      function wiktLang() { return (book && book.wiktionary_lang) || "ru"; }
      // Strip-Regex aus dem Buch ableiten: behalte genau die Zeichen, die in word_regex erlaubt sind.
      // Wir bauen sie aus den Buchstaben-Klassen, die in word_regex vorkommen.
      function keepCharRegex() {
        // Statisch pro Sprache (schnell genug): wir übersetzen die wenigen bekannten Regexes.
        const wr = (book && book.word_regex) || "";
        if (/ÁÉÍÓÚÜáéíóúüÑñ/.test(wr)) return /[^A-Za-zÁÉÍÓÚÜáéíóúüÑñ]/g;  // Spanisch
        return /[^А-Яа-яЁё]/g;  // Russisch (Default)
      }
      function extractLemma(html, lang) {
        // „of <Wort>"-Pattern. Wort-Zeichenklasse hängt von der Sprache ab.
        if (lang === "es") {
          const m = html.match(/of\s+([A-Za-zÁÉÍÓÚÜáéíóúüÑñ]+)/);
          return m ? m[1] : null;
        }
        const m = html.match(/of\s+([А-Яа-яЁё][А-Яа-яЁё]*(?:́[А-Яа-яЁё]+)?)/);
        return m ? m[1] : null;
      }
      function stripAccents(w) { return w.replace(/\u0301/g, ""); }

      async function lookUp(word, x, y) {
        const lang = wiktLang();
        word = word.trim().replace(keepCharRegex(), "");
        if (!word || word.length < 2) return;
        showPopup('<div class="loading">Suche „' + word + '"…</div>', x, y);
        if (dictCache[word]) { renderDict(word, dictCache[word], x, y); return; }
        try {
          const res = await fetch("https://en.wiktionary.org/api/rest_v1/page/definition/" + encodeURIComponent(word));
          if (res.status === 404) { dictCache[word] = { notFound: true }; renderDict(word, dictCache[word], x, y); return; }
          if (!res.ok) throw new Error("HTTP " + res.status);
          const json = await res.json();
          if (!json[lang] || !json[lang].length) { dictCache[word] = { notFound: true }; renderDict(word, dictCache[word], x, y); return; }
          const section = json[lang][0], def0 = section.definitions[0], defText = stripTags(def0.definition);
          const lemma = extractLemma(defText, lang);
          let gloss = defText, displayLemma = word;
          if (lemma && lemma !== word) {
            displayLemma = lemma;
            const lemmaClean = stripAccents(lemma);
            try {
              const res2 = await fetch("https://en.wiktionary.org/api/rest_v1/page/definition/" + encodeURIComponent(lemmaClean));
              if (res2.ok) {
                const j2 = await res2.json();
                if (j2[lang] && j2[lang][0] && j2[lang][0].definitions[0]) gloss = stripTags(j2[lang][0].definitions[0].definition);
              }
            } catch (e) {}
          }
          dictCache[word] = { lemma: displayLemma, pos: section.partOfSpeech, gloss, inflected: lemma && lemma !== word ? word : null };
          renderDict(word, dictCache[word], x, y);
        } catch (e) { dictCache[word] = { error: true }; renderDict(word, dictCache[word], x, y); }
      }
      function renderDict(word, entry, x, y) {
        let html;
        if (entry.notFound) html = '<div class="dw"><span class="lemma">' + word + '</span></div><div class="err">Nicht im Wörterbuch.</div>';
        else if (entry.error) html = '<div class="err">Verbindungsfehler.</div>';
        else {
          html = '<div class="dw"><span class="lemma">' + entry.lemma + '</span>';
          if (entry.inflected) html += '<span class="inflected">(von „' + entry.inflected + '")</span>';
          html += '</div>';
          if (entry.pos) html += '<div class="pos">' + entry.pos + '</div>';
          html += '<div class="gloss">' + entry.gloss + '</div>';
        }
        html += '<div class="close-hint">Tippe daneben zum Schließen</div>';
        showPopup(html, x, y);
      }
      textEl.addEventListener("click", function (e) {
        const wordEl = e.target.closest(".word");
        if (!wordEl) { hidePopup(); return; }
        const rect = wordEl.getBoundingClientRect();
        lookUp(wordEl.textContent.trim(), rect.left + rect.width / 2, rect.top);
      });
      document.addEventListener("click", function (e) {
        if (!dictPopup.contains(e.target) && !e.target.closest(".word")) hidePopup();
      });

      // TTS
      let ttsVoice = null, ttsSpeaking = false, ttsPaused = false;
      function loadVoices() {
        const ttsLang = book ? book.tts_lang : "ru-RU";
        const voices = window.speechSynthesis.getVoices();
        ttsVoice = voices.find(function (v) { return v.lang === ttsLang; }) ||
                   voices.find(function (v) { return v.lang && v.lang.startsWith(ttsLang.split("-")[0]); });
      }
      loadVoices();
      if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;

      ttsRate.addEventListener("input", function () { ttsRateVal.textContent = parseFloat(ttsRate.value).toFixed(2) + "×"; });
      ttsAutoplay.addEventListener("change", function () { ttsAutoplayLabel.classList.toggle("active", ttsAutoplay.checked); });

      function startTTS(autoplay) {
        if (!ttsVoice) loadVoices();
        if (!ttsVoice) {
          if (!autoplay) alert("Keine " + (book ? book.tts_lang : "russische") + " Stimme gefunden!");
          return false;
        }
        const p = chunks[idx];
        // TTS bei EN-Übersetzung überspringen: englischer Text in spanischer Stimme ergibt keinen Sinn,
        // und wir können keine englische Stimme garantieren.
        if (level === "EN") {
          if (!autoplay) alert("Vorlesen ist nur für Original und A2 verfügbar, nicht für die englische Übersetzung.");
          return false;
        }
        let text = p.original;
        if (level !== "original" && p[level] && p[level].trim()) text = p[level];
        // Marker ([∞], [C2], [>C2] etc.) vor dem Vorlesen entfernen,
        // sonst liest die Stimme "eckige Klammer" vor
        text = text.replace(/\s\[(?:∞|[ABC][12]|>C2)\]/g, "");
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = book ? book.tts_lang : "ru-RU";
        utter.voice = ttsVoice;
        utter.rate = parseFloat(ttsRate.value);
        utter.volume = 1; utter.pitch = 1;
        utter.onend = function () {
          ttsSpeaking = false; ttsPaused = false;
          ttsBtn.classList.remove("playing"); ttsBtn.textContent = "🔊";
          if (ttsAutoplay.checked && idx < chunks.length - 1) {
            setTimeout(function () { go(1); setTimeout(function () { startTTS(true); }, 300); }, 500);
          }
        };
        utter.onerror = function () {
          ttsSpeaking = false; ttsPaused = false;
          ttsBtn.classList.remove("playing"); ttsBtn.textContent = "🔊";
        };
        window.speechSynthesis.speak(utter);
        ttsSpeaking = true; ttsPaused = false;
        ttsBtn.classList.add("playing"); ttsBtn.textContent = "⏸";
        return true;
      }
      function stopTTS() {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        ttsSpeaking = false; ttsPaused = false;
        ttsBtn.classList.remove("playing"); ttsBtn.textContent = "🔊";
      }
      ttsBtn.addEventListener("click", function () {
        if (!window.speechSynthesis) { alert("TTS nicht unterstützt."); return; }
        if (ttsSpeaking) {
          if (ttsPaused) { window.speechSynthesis.resume(); ttsPaused = false; ttsBtn.textContent = "⏸"; }
          else { window.speechSynthesis.pause(); ttsPaused = true; ttsBtn.textContent = "▶"; }
          return;
        }
        startTTS(false);
      });

      // Start
      async function init() {
        const savedBookId = parseInt(localStorage.getItem(STORAGE_BOOK) || "0", 10);
        if (savedBookId) {
          try { await openBook(savedBookId); return; } catch (e) {}
        }
        loadLibrary();
      }
      init();
    })();
  </script>
</body>
</html>
