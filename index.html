<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EasyReader2 — Война и мир</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --card-2: #1c212b;
      --text: #e8e8ea;
      --muted: #9aa0aa;
      --muted-2: #6b717b;
      --accent: #4f8cff;
      --accent-soft: rgba(79, 140, 255, 0.15);
      --border: #262b35;
      --level: #3a4150;
      --ok: #2ecc71;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", "Noto Sans", sans-serif;
      height: 100dvh; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
    }

    .app {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 760px; margin: 0 auto;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    /* --- Buch-Auswahl-Overlay --- */
    .book-select-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 150;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .book-select-overlay.hidden { display: none; }
    .book-select-card { max-width: 420px; width: 100%; }
    .book-select-card h2 { margin: 0 0 0.5rem; font-size: 1.3rem; }
    .book-select-card .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 1.5rem; }
    .book-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.8rem;
      cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; gap: 1rem;
    }
    .book-item:hover { border-color: var(--accent); }
    .book-item:active { transform: scale(0.98); }
    .book-item .cover {
      width: 44px; height: 44px; background: var(--accent-soft); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .book-item .info { flex: 1; }
    .book-item .info .t { font-size: 1.05rem; font-weight: 600; }
    .book-item .info .a { color: var(--muted); font-size: 0.82rem; }
    .book-item .info .meta { color: var(--muted-2); font-size: 0.75rem; margin-top: 2px; }
    .book-loading { text-align: center; color: var(--muted); padding: 2rem; }

    /* --- Kopf --- */
    header {
      padding: 0.9rem 1.1rem 0.6rem; flex-shrink: 0;
      display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap;
    }
    .head-row { display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap; flex: 1; }
    .head-row h1 { margin: 0; font-size: 1.15rem; letter-spacing: -0.01em; }
    .head-row .author { color: var(--muted); font-size: 0.82rem; }
    .library-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 0.3rem 0.6rem; font-size: 1rem; cursor: pointer;
      font-family: inherit;
    }

    /* --- Level-Umschalter --- */
    .levels {
      display: flex; gap: 0.4rem; padding: 0.4rem 1.1rem 0.7rem;
      overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
    }
    .levels::-webkit-scrollbar { display: none; }
    .lvl-btn {
      flex-shrink: 0; padding: 0.45rem 0.9rem;
      background: var(--card); color: var(--muted);
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s ease; font-family: inherit;
    }
    .lvl-btn:hover { color: var(--text); }
    .lvl-btn.active {
      background: var(--accent-soft); color: var(--accent); border-color: var(--accent);
    }

    /* --- Chunk-Anzeige --- */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 0 1.3rem; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .chunk { max-width: 620px; width: 100%; text-align: left; }
    .chunk-nr { color: var(--muted-2); font-size: 0.78rem; margin-bottom: 0.6rem; letter-spacing: 0.04em; }
    .chunk-text {
      font-size: 1.6rem; font-size: clamp(1.3rem, 5.5vw, 1.6rem);
      line-height: 1.72; color: var(--text); hyphens: auto;
      -webkit-text-size-adjust: 100%;
    }
    .chunk-text .word {
      cursor: pointer; border-radius: 4px;
      -webkit-tap-highlight-color: rgba(79, 140, 255, 0.25); transition: background 0.1s;
    }
    .chunk-text .word:active { background: var(--accent-soft); }
    .placeholder { text-align: center; color: var(--muted); padding: 2rem 1rem; }
    .placeholder .icon { font-size: 2rem; display: block; margin-bottom: 0.6rem; opacity: 0.6; }
    .placeholder .pill {
      display: inline-block; padding: 0.2rem 0.7rem;
      background: var(--level); border-radius: 6px; font-size: 0.8rem; margin-top: 0.4rem;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* --- TTS-Bar --- */
    .tts-bar {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.3rem 1.1rem 0.5rem; flex-shrink: 0; flex-wrap: wrap;
    }
    .tts-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 1.1rem; cursor: pointer;
      font-family: inherit; -webkit-tap-highlight-color: transparent; transition: all 0.12s;
    }
    .tts-btn:hover { border-color: var(--accent); }
    .tts-btn.playing { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .tts-speed { display: flex; align-items: center; gap: 0.4rem; color: var(--muted); font-size: 0.8rem; }
    .tts-speed input[type="range"] { width: 80px; accent-color: var(--accent); }
    .tts-speed .val { min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; color: var(--text); }
    .tts-autoplay {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--muted); font-size: 0.82rem; cursor: pointer; user-select: none;
    }
    .tts-autoplay input { accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; }
    .tts-autoplay.active { color: var(--accent); }

    /* --- Footer --- */
    footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem; padding: 0.7rem 1.1rem 1rem; flex-shrink: 0;
    }
    .nav-btn {
      min-width: 64px; padding: 0.7rem 1rem;
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 1rem; cursor: pointer; transition: all 0.12s ease; font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .nav-btn:active:not(:disabled) { transform: scale(0.96); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .counter { color: var(--muted); font-size: 0.88rem; font-variant-numeric: tabular-nums; text-align: center; flex: 1; }
    .counter .now { color: var(--text); font-weight: 600; }
    .counter .ver { display: block; font-size: 0.68rem; color: var(--muted-2); margin-top: 2px; }

    /* --- Pop-up & Diag --- */
    .dict-popup {
      position: fixed; z-index: 100;
      background: var(--card-2); border: 1px solid var(--accent);
      border-radius: 12px; padding: 1.3rem 1.6rem;
      /* Responsive: auf dem PC bis 494px, auf dem Handy nicht breiter als der
         Viewport minus Rand (verhindert Überlappung auf schmalen Bildschirmen). */
      max-width: 494px; width: min(494px, calc(100vw - 20px));
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); font-size: 1rem; display: none;
    }
    .dict-popup.visible { display: block; }
    .dict-popup .dw { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.3rem; }
    .dict-popup .lemma { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .dict-popup .inflected { color: var(--muted); font-size: 1rem; }
    .dict-popup .rank-badge {
      color: var(--ok); font-size: 0.85rem; font-weight: 600;
      background: rgba(46,204,113,0.12); border: 1px solid var(--ok);
      padding: 0.15rem 0.5rem; border-radius: 6px; white-space: nowrap;
      margin-left: 0.3rem;
    }
    .dict-popup .rank-badge.film-badge {
      color: var(--ok); border-color: var(--ok);
      background: rgba(46,204,113,0.12);
    }
    .dict-popup .pos { color: var(--muted-2); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .dict-popup .gloss { color: var(--text); line-height: 1.45; }
    .dict-popup .loading, .dict-popup .err { color: var(--muted); }
    .dict-popup .close-hint { color: var(--muted-2); font-size: 0.7rem; margin-top: 0.5rem; }
    /* Lernen-Button im Popup */
    .dict-popup .learn-btn {
      margin-top: 0.7rem; padding: 0.4rem 0.8rem; font-size: 0.78rem; font-weight: 600;
      background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent);
      border-radius: 999px; cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    .dict-popup .learn-btn:hover { background: var(--accent); color: var(--bg); }
    .dict-popup .learn-btn.added { opacity: 0.6; cursor: default; }
    /* Header: Review-Button + Badge */
    .review-btn { position: relative; }
    .due-badge {
      position: absolute; top: -6px; right: -6px; background: var(--accent); color: var(--bg);
      font-size: 0.65rem; font-weight: 700; min-width: 16px; height: 16px; padding: 0 4px;
      border-radius: 999px; display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    /* Review-Overlay */
    .review-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 150;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
    .review-overlay.hidden { display: none; }
    .review-topbar { width: 100%; max-width: 460px; display: flex; justify-content: space-between;
      margin-bottom: 1rem; }
    .review-topbar-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 1rem; cursor: pointer;
      font-family: inherit; transition: all 0.12s;
    }
    .review-topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
    .review-autoplay-label {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--muted); font-size: 0.85rem; cursor: pointer; user-select: none;
    }
    .review-autoplay-label input { cursor: pointer; accent-color: var(--accent); }
    .card-front-row { display: flex; align-items: flex-start; gap: 0.8rem; }
    .card-front-row > div:first-child { flex: 1; min-width: 0; }
    .card-tts-btn {
      background: var(--accent-soft); border: 1px solid var(--accent); color: var(--accent);
      border-radius: 999px; padding: 0.4rem 0.7rem; font-size: 1rem; cursor: pointer;
      font-family: inherit; flex-shrink: 0; transition: all 0.12s;
    }
    .card-tts-btn:hover { background: var(--accent); color: var(--bg); }
    .review-card { max-width: 460px; width: 100%; text-align: center; }
    .review-card h2 { margin: 0 0 0.5rem; font-size: 1.3rem; }
    .review-card .counter { color: var(--muted); font-size: 0.85rem; margin: 0 0 1.5rem; }
    .review-card .vocab-lemma {
      font-size: clamp(2rem, 8vw, 2.8rem); font-weight: 700; color: var(--accent);
      margin: 1rem 0 0.4rem; word-break: break-word;
    }
    .review-card .vocab-sentence {
      font-size: clamp(1.3rem, 5vw, 1.6rem); line-height: 1.5; color: var(--text);
      margin: 1rem 0 0.4rem; word-break: break-word;
    }
    .review-card .vocab-sentence .hl-lemma {
      color: var(--accent); font-weight: 700;
      border-bottom: 2px dotted var(--accent); padding-bottom: 1px;
    }
    .review-card .vocab-sentence .hl-surface {
      color: var(--muted); font-size: 0.75em; font-weight: 400;
    }
    .review-card .vocab-pos { color: var(--muted-2); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .review-card .vocab-inflected { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }
    .review-card .vocab-gloss {
      font-size: 1.15rem; color: var(--text); line-height: 1.5; margin-top: 1.2rem;
      padding: 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    }
    .review-card .vocab-en-sentence {
      font-size: 1rem; color: var(--muted); line-height: 1.45; margin-top: 0.6rem;
      padding: 0.8rem 1rem; background: var(--card-2); border-left: 3px solid var(--accent);
      border-radius: 6px; font-style: italic;
    }
    .review-card .detail-stats {
      display: flex; gap: 1rem; justify-content: center; margin-top: 1rem;
      color: var(--muted-2); font-size: 0.78rem;
    }
    .review-card .detail-buttons {
      display: flex; gap: 0.8rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap;
    }
    .review-card .deck-row { cursor: pointer; }
    .review-card .deck-row:hover { background: var(--accent-soft); }

    /* Synonym-Popup (über dem Review-Overlay) */
    .syn-overlay {
      position: fixed; inset: 0; z-index: 160;
      background: rgba(0, 0, 0, 0.6);
      display: flex; align-items: center; justify-content: center;
      padding: 1.2rem;
    }
    .syn-overlay.hidden { display: none; }
    .syn-popup {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.3rem; max-width: 360px; width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); position: relative;
      font-family: inherit;
    }
    .syn-popup .syn-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.8rem;
    }
    .syn-popup .syn-title { font-size: 0.78rem; color: var(--muted-2); text-transform: uppercase; letter-spacing: 0.05em; }
    .syn-popup .syn-close {
      background: transparent; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer; padding: 0 0.3rem; line-height: 1;
    }
    .syn-popup .syn-close:hover { color: var(--accent); }
    .syn-popup .syn-loading {
      text-align: center; color: var(--muted); padding: 1.2rem 0; line-height: 1.6;
    }
    .syn-popup .syn-loading .icon {
      display: inline-block; animation: spin 1s linear infinite; font-size: 1.6rem;
    }
    .syn-popup .syn-loading .hint { font-size: 0.75rem; color: var(--muted-2); }
    .syn-popup .syn-error { color: var(--text); line-height: 1.5; }
    .syn-popup .syn-error .icon { font-size: 1.3rem; }
    .syn-popup .syn-error .msg { font-size: 0.8rem; color: var(--muted-2); display: block; margin-top: 0.3rem; }
    .syn-popup .syn-error .retry { font-size: 0.72rem; color: var(--muted-2); display: block; margin-top: 0.8rem; }
    .syn-popup .syn-word {
      font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem;
    }
    .syn-popup .syn-arrow { color: var(--muted-2); font-size: 1.1rem; margin: 0.2rem 0; }
    .syn-popup .syn-gloss { color: var(--text); font-size: 0.92rem; line-height: 1.4; }
    .syn-popup .syn-meta {
      display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.9rem;
      font-size: 0.78rem; color: var(--muted);
    }
    .syn-popup .syn-meta .badge {
      background: var(--accent-soft); color: var(--accent);
      padding: 0.15rem 0.55rem; border-radius: 999px; font-weight: 600;
    }
    .syn-popup .syn-meta .rank { color: var(--muted-2); }
    .syn-popup .syn-note { color: var(--muted); font-size: 0.78rem; font-style: italic; margin-top: 0.7rem; }
    .syn-popup .syn-empty { color: var(--muted); line-height: 1.5; }
    /* Update-Banner (neue Version verfügbar) */
    #update-banner {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 200; background: var(--accent); color: var(--bg);
      padding: 0.6rem 0.9rem; border-radius: 999px;
      box-shadow: 0 6px 24px rgba(79,140,255,0.4);
      display: flex; align-items: center; gap: 0.7rem;
      font-size: 0.85rem; font-weight: 600;
      animation: slideDown 0.3s ease-out;
    }
    #update-banner button {
      background: var(--bg); color: var(--accent); border: none;
      padding: 0.3rem 0.8rem; border-radius: 999px; font-weight: 700;
      cursor: pointer; font-family: inherit; font-size: 0.82rem;
    }
    #update-banner #update-dismiss-btn {
      background: transparent; color: var(--bg); opacity: 0.7;
      padding: 0.2rem 0.4rem; font-size: 0.9rem;
    }
    #update-banner #update-dismiss-btn:hover { opacity: 1; }
    @keyframes slideDown {
      from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    .review-card .grade-buttons { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
    .review-card .nav-buttons { display: flex; gap: 0.6rem; justify-content: center; margin-top: 0.8rem; }
    .review-card .nav-buttons .grade-btn:disabled { opacity: 0.35; cursor: default; }
    .review-card .grade-btn {
      padding: 0.6rem 1rem; font-size: 0.85rem; font-weight: 600;
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; cursor: pointer; font-family: inherit; transition: all 0.12s;
      min-width: 90px;
    }
    .review-card .grade-btn:hover { border-color: var(--accent); color: var(--accent); }
    .review-card .grade-btn.primary { border-color: var(--accent); color: var(--accent); }
    .review-card .done-msg { color: var(--ok); font-size: 1.1rem; margin: 2rem 0; }
    .review-card .close-review {
      margin-top: 1.5rem; padding: 0.5rem 1rem; font-size: 0.85rem;
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; cursor: pointer; font-family: inherit;
    }
    .review-card .close-review:hover { color: var(--text); border-color: var(--muted); }
    /* Löschen-Button oben rechts auf einer Karte */
    .review-card .card-delete-btn {
      background: transparent; border: none; color: var(--muted-2); cursor: pointer;
      font-size: 0.9rem; padding: 0.2rem 0.4rem; float: right; font-family: inherit;
    }
    .review-card .card-delete-btn:hover { color: var(--accent); }
    /* Popup: Status + Entfernen */
    .dict-popup .deck-status { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.7rem; }
    .dict-popup .added-mark {
      font-size: 0.78rem; font-weight: 600; color: var(--ok);
      padding: 0.4rem 0.8rem; border-radius: 999px; background: rgba(46,204,113,0.12);
    }
    .dict-popup .remove-btn {
      background: transparent; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.75rem; font-family: inherit; text-decoration: underline; padding: 0.2rem;
    }
    .dict-popup .remove-btn:hover { color: var(--accent); }
    /* Deck-Liste in der Fertig-Ansicht */
    .deck-list {
      max-height: 50vh; overflow-y: auto; margin: 1rem 0;
      border: 1px solid var(--border); border-radius: 10px; padding: 0.4rem;
      text-align: left;
    }
    .deck-row {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border);
    }
    .deck-row:last-child { border-bottom: none; }
    .deck-row-main { flex: 1; min-width: 0; }
    .deck-row-lemma { font-weight: 600; color: var(--text); }
    .deck-row-reps { color: var(--muted-2); font-size: 0.75rem; }
    .deck-row-due { color: var(--accent); font-size: 0.72rem; font-weight: 600; }
    .deck-row-future { color: var(--muted-2); font-size: 0.72rem; }
    .deck-row-gloss { color: var(--muted); font-size: 0.78rem; margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .deck-row-del {
      background: transparent; border: none; color: var(--muted-2); cursor: pointer;
      font-size: 0.95rem; padding: 0.3rem 0.5rem; border-radius: 6px; font-family: inherit;
      flex-shrink: 0;
    }
    .deck-row-del:hover { color: var(--accent); background: var(--accent-soft); }
  </style>
</head>
<body>
  <div class="app">
    <!-- Buch-Auswahl -->
    <div class="book-select-overlay" id="book-select-overlay">
      <div class="book-select-card">
        <h2>📚 Bibliothek</h2>
        <p class="sub">Wähle ein Buch zum Lesen</p>
        <div id="book-list">
          <div class="book-loading">Lade Bibliothek…</div>
        </div>
      </div>
    </div>

    <!-- Hauptansicht -->
    <header style="display:none" id="main-header">
      <div class="head-row">
        <h1 id="book-title">…</h1>
        <span class="author" id="book-author"></span>
      </div>
      <button class="library-btn" id="library-btn" aria-label="Bibliothek">📚</button>
      <button class="library-btn review-btn" id="review-btn" aria-label="Vokabeln üben">🎓<span class="due-badge" id="due-badge"></span></button>
    </header>

    <!-- Review-Overlay (Vokabeltrainer) -->
    <div class="review-overlay hidden" id="review-overlay">
      <div class="review-topbar">
        <button class="review-topbar-btn" id="review-lib-btn" title="Zur Bibliothek">📚</button>
        <button class="review-topbar-btn" id="review-deck-btn" title="Alle Karten (Liste)">📋</button>
        <label class="review-autoplay-label" title="Satz automatisch vorlesen beim Kartenwechsel">
          <input type="checkbox" id="review-autoplay-cb"> Autoplay
        </label>
        <button class="review-topbar-btn" id="review-close-btn" title="Schließen">✕</button>
      </div>
      <div class="review-card" id="review-card">
        <!-- wird per JS gefüllt -->
      </div>
    </div>

    <!-- Synonym-Popup (live GLM, Test der Kette WebApp→Worker→GLM) -->
    <div class="syn-overlay hidden" id="syn-overlay">
      <div class="syn-popup" id="syn-popup">
        <!-- wird per JS gefüllt -->
      </div>
    </div>

    <nav class="levels" id="levels" style="display:none"></nav>

    <main>
      <div class="chunk">
        <div class="chunk-nr" id="chunk-nr"></div>
        <div class="chunk-text" id="chunk-text"></div>
      </div>
    </main>

    <div class="tts-bar" id="tts-bar" style="display:none">
      <button class="tts-btn" id="tts-btn" aria-label="Vorlesen">🔊</button>
      <div class="tts-speed">
        <span>Tempo</span>
        <input type="range" id="tts-rate" min="0.5" max="1.5" step="0.05" value="0.8" />
        <span class="val" id="tts-rate-val">0.8×</span>
      </div>
      <label class="tts-autoplay" id="tts-autoplay-label">
        <input type="checkbox" id="tts-autoplay" />
        <span>▶ Autoplay</span>
      </label>
    </div>

    <footer id="main-footer" style="display:none">
      <button class="nav-btn" id="prev" aria-label="Zurück">‹</button>
      <div class="counter" id="counter"></div>
      <button class="nav-btn" id="next" aria-label="Weiter">›</button>
    </footer>
  </div>

  <div class="dict-popup" id="dict-popup"></div>

  <script>
    (function () {
      const VERSION = "7.9";
      const API = "https://easyreader2.st-schaab.workers.dev";
      let LEVELS = ["original", "4000", "3000", "2000", "1000"]; // Default (ältere book-N.json ohne levels-Feld)
      const CEFR_LEVELS = ["A1", "A2", "B1", "B2", "C1", "C2"]; // CEFR-Labels ohne „ W."-Suffix
      const STORAGE_BOOK = "easyreader2.bookId";

      let bookId = null, book = null, chunks = [], idx = 0, level = "original";
      let userId = localStorage.getItem("easyreader2.userId");
      if (!userId) {
        userId = "anon-" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("easyreader2.userId", userId);
      }

      // --- SRS / Vokabel-Deck (Interval-basiert, Feldnamen kompatibel mit user_words-Schema) ---
      const DECK_KEY = "er2_deck";
      function loadDeck() {
        try { return JSON.parse(localStorage.getItem(DECK_KEY) || "{}"); }
        catch (e) { return {}; }
      }
      function saveDeck(deck) {
        localStorage.setItem(DECK_KEY, JSON.stringify(deck));
        updateBadge();
      }
      // Mini-Satz-Extraktion: gibt den Satz aus dem A1-Text zurück, der eine Form
      // des Lemmas enthält. Liefert { sentence, surfaceForm } oder null.
      // Matching-Strategie: Wortgrenzen-treues Lowercase-Matching auf den Lemma-Stamm.
      // Für sehr kurze Lemmata (≤ 3 Buchstaben) exaktes Matching, sonst Stamm-Matching.
      // Stamm für Satz-Matching: nimmt das Lemma bis auf das letzte Zeichen.
      // So bleiben Beugungssuffixe matchbar (muralla→murall → murallas),
      // aber ähnliche kurze Wörter greifen nicht ineinander (hierba→hierb ≠ hierro).
      // Sehr kurze Lemmata (≤3) werden direkt matchend verwendet, weil Kürzung
      // hier zu viele false positives liefert.
      function lemmaStem(lemmaLc) {
        if (lemmaLc.length <= 3) return lemmaLc;
        return lemmaLc.slice(0, Math.max(4, lemmaLc.length - 1));
      }
      function findMiniSentence(lemma, a1Text) {
        if (!lemma || !a1Text) return null;
        const lemmaLc = lemma.toLowerCase();
        // Sätze am Satzende splitten (wie im Chunker)
        const sentences = a1Text.split(/([.!?]+)/).reduce((acc, part, i, arr) => {
          if (i % 2 === 0 && part.trim()) acc.push((part + (arr[i + 1] || "")).trim());
          return acc;
        }, []);
        const stem = lemmaStem(lemmaLc);
        for (const s of sentences) {
          // Wortgrenzen-Regex: Suche nach Wörtern, die mit dem Stamm beginnen
          // (erlaubt Beugung: muralla, murallas; aber nicht mur en muralla)
          const wordRe = new RegExp(
            "\\b(" + escapeRegex(stem) + "[a-záéíóúñü]*)\\b",
            "i"
          );
          const m = s.match(wordRe);
          if (m) {
            return { sentence: s, surfaceForm: m[1] };
          }
        }
        return null;
      }
      function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

      function addCard(entry, a1Text, chunkId) {
        // entry: { lemma, pos, gloss, inflected } aus renderDict
        // a1Text: optional, der A1-Text des aktuellen Chunks für die Satz-Extraktion
        // chunkId: optional, für die Satz-Map-Übersetzung (spanisch)
        if (!entry || !entry.lemma) return false;
        const deck = loadDeck();
        if (deck[entry.lemma]) return false;  // schon im Deck
        const now = new Date();
        // Mini-Satz extrahieren (falls A1-Text verfügbar)
        let mini = null;
        if (a1Text) mini = findMiniSentence(entry.lemma, a1Text);
        // Satz-Übersetzung aus der sentenceMap (falls geladen)
        let sentence_en = null;
        if (chunkId && sentenceMap) {
          const pair = findSentenceWithTranslation(entry.lemma, chunkId);
          if (pair) sentence_en = pair.en;
        }
        deck[entry.lemma] = {
          lemma: entry.lemma,
          gloss: entry.gloss || "",
          pos: entry.pos || "",
          inflected: entry.inflected || null,
          lang: (book && book.wiktionary_lang) || "ru",
          interval_hours: 0,
          due: now.toISOString(),
          reps: 0,
          added: now.toISOString(),
          sentence: mini ? mini.sentence : null,
          surfaceForm: mini ? mini.surfaceForm : null,
          sentence_en: sentence_en,
          chunk_id: chunkId || null,
        };
        saveDeck(deck);
        return true;
      }
      function getDueCards() {
        const deck = loadDeck();
        const now = Date.now();
        return Object.values(deck)
          .filter(c => new Date(c.due).getTime() <= now)
          .sort((a, b) => new Date(a.due).getTime() - new Date(b.due).getTime());
      }
      function countDue() {
        const deck = loadDeck();
        const now = Date.now();
        return Object.values(deck).filter(c => new Date(c.due).getTime() <= now).length;
      }
      function gradeCard(lemma, newIntervalHours) {
        const deck = loadDeck();
        const c = deck[lemma];
        if (!c) return;
        c.reps = (c.reps || 0) + 1;
        c.interval_hours = newIntervalHours;
        c.due = new Date(Date.now() + newIntervalHours * 3600 * 1000).toISOString();
        saveDeck(deck);
      }
      function removeCard(lemma) {
        const deck = loadDeck();
        if (!deck[lemma]) return false;
        delete deck[lemma];
        saveDeck(deck);
        return true;
      }
      function intervalLabel(hours) {
        if (hours < 1) return Math.round(hours * 60) + " min";
        if (hours < 24) return hours.toFixed(1).replace(/\.0$/, "") + " h";
        const d = Math.round(hours / 24);
        return d + " Tag" + (d === 1 ? "" : "e");
      }
      let reviewBtnEl = null, dueBadgeEl = null;
      function updateBadge() {
        if (!dueBadgeEl) return;
        const n = countDue();
        dueBadgeEl.textContent = n > 0 ? (n > 99 ? "99+" : n) : "";
        dueBadgeEl.style.display = n > 0 ? "" : "none";
      }

      const overlay = document.getElementById("book-select-overlay");
      const bookListEl = document.getElementById("book-list");
      const header = document.getElementById("main-header");
      const titleEl = document.getElementById("book-title");
      const authorEl = document.getElementById("book-author");
      const libraryBtn = document.getElementById("library-btn");
      reviewBtnEl = document.getElementById("review-btn");
      dueBadgeEl = document.getElementById("due-badge");
      const reviewOverlay = document.getElementById("review-overlay");
      const reviewCard = document.getElementById("review-card");
      const synOverlay = document.getElementById("syn-overlay");
      const synPopup = document.getElementById("syn-popup");
      // Topbar-Buttons im Review-Overlay: 📚 zur Bibliothek, ✕ schließen
      document.getElementById("review-close-btn").addEventListener("click", closeReview);
      document.getElementById("review-deck-btn").addEventListener("click", renderReviewDone);
      document.getElementById("review-autoplay-cb").addEventListener("change", function (e) {
        reviewAutoplay = e.target.checked;
        if (!reviewAutoplay && reviewTTSspeaking && window.speechSynthesis) window.speechSynthesis.cancel();
      });
      document.getElementById("review-lib-btn").addEventListener("click", function () {
        closeReview();
        overlay.classList.remove("hidden");
        loadLibrary();
      });
      updateBadge();  // initialen Badge-Stand setzen
      setInterval(updateBadge, 60000);  // alle 60s aktualisieren (fällige Karten)
      const levelsEl = document.getElementById("levels");
      const textEl = document.getElementById("chunk-text");
      const nrEl = document.getElementById("chunk-nr");
      const counterEl = document.getElementById("counter");
      const prevBtn = document.getElementById("prev");
      const nextBtn = document.getElementById("next");
      const ttsBar = document.getElementById("tts-bar");
      const ttsBtn = document.getElementById("tts-btn");
      const ttsRate = document.getElementById("tts-rate");
      const ttsRateVal = document.getElementById("tts-rate-val");
      const ttsAutoplay = document.getElementById("tts-autoplay");
      const ttsAutoplayLabel = document.getElementById("tts-autoplay-label");
      const mainFooter = document.getElementById("main-footer");
      const dictPopup = document.getElementById("dict-popup");

      async function apiGet(path) {
        const res = await fetch(API + path, { headers: { "X-User-Id": userId } });
        return res.json();
      }
      async function apiPost(path, body) {
        const res = await fetch(API + path, {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8", "X-User-Id": userId },
          body: JSON.stringify(body),
        });
        return res.json();
      }
      function fetchWithTimeout(url, options, ms) {
        return new Promise(function (resolve, reject) {
          const controller = new AbortController();
          const timer = setTimeout(function () { controller.abort(); reject(new Error("Timeout")); }, ms);
          fetch(url, Object.assign({ signal: controller.signal }, options))
            .then(function (res) { clearTimeout(timer); resolve(res); })
            .catch(function (err) { clearTimeout(timer); reject(err); });
        });
      }

      async function loadLibrary() {
        bookListEl.innerHTML = '<div class="book-loading">Lade Bibliothek…</div>';
        try {
          // Statische Bibliotheks-Datei von GitHub Pages laden
          const res = await fetchWithTimeout("library.json?v=" + VERSION, {}, 10000);
          if (!res.ok) throw new Error("library.json nicht gefunden");
          const data = await res.json();
          bookListEl.innerHTML = "";
          if (!data.books || data.books.length === 0) {
            bookListEl.innerHTML = '<div class="book-loading">Keine Bücher vorhanden.</div>';
            return;
          }
          for (const b of data.books) {
            const item = document.createElement("div");
            item.className = "book-item";
            const metaParts = [(b.lang || "").toUpperCase()];
            if (b.scope) metaParts.push(b.scope);
            metaParts.push(b.chunks + " Absätze");
            item.innerHTML =
              '<div class="cover">📖</div>' +
              '<div class="info">' +
              '<div class="t">' + b.title + '</div>' +
              '<div class="a">' + (b.author || "") + '</div>' +
              '<div class="meta">' + metaParts.join(" · ") + '</div>' +
              '</div>';
            item.addEventListener("click", function () { openBook(b.id); });
            bookListEl.appendChild(item);
          }
        } catch (e) {
          bookListEl.innerHTML =
            '<div class="book-loading">' +
            '<p>⚠️ Bibliothek konnte nicht geladen werden</p>' +
            '<p style="font-size:0.8rem;margin-top:0.5rem">' + (e.message || "Netzwerkfehler") + '</p>' +
            '<button class="nav-btn" style="margin-top:1rem" onclick="location.reload()">Erneut versuchen</button>' +
            '</div>';
        }
      }

      async function openBook(id) {
        bookListEl.style.opacity = "0.5";
        bookListEl.style.pointerEvents = "none";

        try {
          // Statische JSON-Datei von GitHub Pages laden (sehr zuverlässig aus Russland)
          // Benennung: book-1.json für Buch mit ID 1
          const dataPath = "book-" + id + ".json?v=" + VERSION;
          const res = await fetchWithTimeout(dataPath, {}, 20000);
          if (!res.ok) throw new Error("Buchdatei nicht gefunden: " + dataPath);
          const data = await res.json();
          book = data.book;
          chunks = data.chunks;
          if (!chunks || chunks.length === 0) { alert("Buch hat keine Absätze."); bookListEl.style.opacity = ""; bookListEl.style.pointerEvents = ""; return; }

          // Level-Liste aus dem Buch übernehmen (neu: book.levels), sonst Default
          if (book.levels && Array.isArray(book.levels) && book.levels.length > 0) {
            LEVELS = book.levels;
          } else {
            LEVELS = ["original", "4000", "3000", "2000", "1000"];
          }

          // Book-Liste wieder aktivieren (für späteren Bibliotheks-Besuch)
          bookListEl.style.opacity = "";
          bookListEl.style.pointerEvents = "";

          bookId = id;
          localStorage.setItem(STORAGE_BOOK, id);

          titleEl.textContent = book.title;
          authorEl.textContent = book.author || "";
          overlay.classList.add("hidden");
          header.style.display = "";
          levelsEl.style.display = "";
          ttsBar.style.display = "";
          mainFooter.style.display = "";

          levelsEl.innerHTML = "";
          LEVELS.forEach(function (lvl) {
            const b = document.createElement("button");
            b.className = "lvl-btn";
            b.dataset.lvl = lvl;
            // Label: "Original" für original; CEFR-Level oder EN als reines Label; sonst "N W."
            let label;
            if (lvl === "original") label = "Original";
            else if (lvl === "EN") label = "EN";
            else if (lvl === "EN-A1") label = "EN-A1";
            else if (CEFR_LEVELS.indexOf(lvl) >= 0) label = lvl;
            else label = lvl + " W.";
            b.textContent = label;
            b.addEventListener("click", function () { setLevel(lvl); });
            levelsEl.appendChild(b);
          });

          // Progress laden (optional, localStorage-Fallback)
          idx = 0; level = "original";
          try {
            const saved = await apiGet("/api/progress/" + id);
            if (saved.progress) {
              idx = Math.min(Math.max(saved.progress.chunk_index || 0, 0), chunks.length - 1);
              const savedLvl = saved.progress.level;
              level = LEVELS.includes(savedLvl) ? savedLvl : "original";
            }
          } catch (e) {
            // Fallback: localStorage
            const ls = localStorage.getItem("er2_" + id + "_pos");
            if (ls) { try { const p = JSON.parse(ls); idx = p.idx || 0; level = p.level || "original"; } catch (e2) {} }
          }
          setLevel(level);
          render();
        } catch (e) {
          bookListEl.style.opacity = "";
          bookListEl.style.pointerEvents = "";
          alert("Buch konnte nicht geladen werden: " + (e.message || "Netzwerkfehler"));
        }
      }

      libraryBtn.addEventListener("click", function () {
        overlay.classList.remove("hidden");
        loadLibrary();
      });

      // --- Review-Modus (Vokabeltrainer) ---
      let reviewQueue = [];
      let reviewPos = 0;
      let reviewFlipped = false;
      let reviewAutoplay = false;
      let reviewTTSspeaking = false;

      // TTS für den Review-Modus: wählt Stimme nach lang-Code der Karte (z.B. "es").
      // Cacht gefundene Stimmen pro Sprache.
      const reviewVoiceCache = {};
      function getReviewVoice(lang) {
        if (!lang) return null;
        if (reviewVoiceCache[lang]) return reviewVoiceCache[lang];
        const voices = window.speechSynthesis.getVoices();
        const v = voices.find(v => v.lang === lang) ||
                 voices.find(v => v.lang && v.lang.startsWith(lang + "-")) ||
                 voices.find(v => v.lang && v.lang.startsWith(lang));
        reviewVoiceCache[lang] = v || false;  // false = gesucht und nicht gefunden
        return v || null;
      }
      function playCardText(text, lang) {
        if (!window.speechSynthesis) return false;
        if (reviewTTSspeaking) { window.speechSynthesis.cancel(); }
        const voice = getReviewVoice(lang);
        if (!voice) {
          // Diagnose-Alert (analog v6.3 Lesemodus)
          const voices = window.speechSynthesis.getVoices();
          const matching = voices.filter(v => v.lang && v.lang.startsWith(lang));
          let msg = "Keine „" + lang + "\" Stimme gefunden.\n\n";
          msg += "Gefundene Stimmen gesamt: " + voices.length + "\n";
          msg += "Davon „" + lang + "\": " + matching.length + "\n";
          if (voices.length === 0) msg += "→ Chrome-Bug: Seite neu laden (Strg+F5).";
          else if (matching.length === 0) msg += "→ Sprachstimme im Betriebssystem installieren.";
          alert(msg);
          return false;
        }
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = voice;
        utter.lang = voice.lang;
        utter.rate = parseFloat(ttsRate.value);
        utter.onend = function () { reviewTTSspeaking = false; };
        utter.onerror = function () { reviewTTSspeaking = false; };
        reviewTTSspeaking = true;
        window.speechSynthesis.speak(utter);
        return true;
      }

      function openReview() {
        reviewQueue = getDueCards();
        reviewPos = 0;
        reviewOverlay.classList.remove("hidden");
        renderReviewCard();
      }
      function closeReview() {
        reviewOverlay.classList.add("hidden");
        reviewQueue = [];
      }
      // „Fertig"-Ansicht: Erfolgsmeldung + komplette Deck-Liste mit Lösch-Buttons
      function renderReviewDone() {
        const deck = loadDeck();
        const allCards = Object.values(deck).sort((a, b) => (a.added || "").localeCompare(b.added || ""));
        const total = allCards.length;
        let listHtml = "";
        if (total === 0) {
          listHtml = '<p class="counter">Dein Deck ist leer.</p>';
        } else {
          listHtml = '<p class="counter">Deck: ' + total + ' Karten — zum Entfernen 🗑 klicken</p>';
          listHtml += '<div class="deck-list">';
          for (const c of allCards) {
            const due = new Date(c.due);
            const now = new Date();
            const isDue = due.getTime() <= now.getTime();
            const lemmaAttr = escapeHtml(c.lemma).replace(/"/g, '&quot;');
            listHtml +=
              '<div class="deck-row" data-lemma="' + lemmaAttr + '">' +
                '<div class="deck-row-main">' +
                  '<span class="deck-row-lemma">' + escapeHtml(c.lemma) + '</span>' +
                  (c.reps > 0 ? ' <span class="deck-row-reps">×' + c.reps + '</span>' : '') +
                  (isDue ? ' <span class="deck-row-due">fällig</span>' : ' <span class="deck-row-future">in ' + intervalLabel(Math.max(0.5, (due.getTime() - now.getTime()) / 3600000)) + '</span>') +
                  (c.gloss ? '<div class="deck-row-gloss">' + escapeHtml(c.gloss.substring(0, 60)) + (c.gloss.length > 60 ? '…' : '') + '</div>' : '') +
                '</div>' +
                '<button class="deck-row-del" data-del-lemma="' + lemmaAttr + '">🗑</button>' +
              '</div>';
          }
          listHtml += '</div>';
        }
        reviewCard.innerHTML =
          '<h2>🎓 Üben</h2>' +
          (total > 0 ? '<div class="done-msg">✓ Alle fälligen Karten geschafft.</div>' : '') +
          listHtml +
          '<button class="close-review" id="close-review-btn">Schließen</button>';
        document.getElementById("close-review-btn").addEventListener("click", closeReview);
        // Lösch-Buttons binden
        const delBtns = reviewCard.querySelectorAll(".deck-row-del");
        for (const b of delBtns) {
          b.addEventListener("click", function (e) {
            e.stopPropagation();  // nicht auch den Detail-View öffnen
            const lemma = b.getAttribute("data-del-lemma");
            if (confirm("„" + lemma + "\" aus dem Deck löschen?")) {
              removeCard(lemma);
              renderReviewDone();  // Liste neu rendern
            }
          });
        }
        // Ganze Reihe klickbar für Detail-View
        const rows = reviewCard.querySelectorAll(".deck-row");
        for (const r of rows) {
          r.addEventListener("click", function () {
            const lemma = r.getAttribute("data-lemma");
            if (lemma) renderReviewDetail(lemma);
          });
        }
        updateBadge();
      }
      // Detail-View für eine einzelne Karte: alle Informationen + 🗑 + 📖 Lernen
      function renderReviewDetail(lemma) {
        const deck = loadDeck();
        const c = deck[lemma];
        if (!c) { renderReviewDone(); return; }
        // Alle Karten sortiert (gleiche Reihenfolge wie die Liste)
        const allCards = Object.values(deck).sort((a, b) => (a.added || "").localeCompare(b.added || ""));
        const posInDeck = allCards.findIndex(x => x.lemma === lemma);
        const total = allCards.length;
        const due = new Date(c.due);
        const now = new Date();
        const isDue = due.getTime() <= now.getTime();
        const dueText = isDue ? "fällig" : "in " + intervalLabel(Math.max(0.5, (due.getTime() - now.getTime()) / 3600000));

        // Spanischer Satz mit hervorgehobenem Lernwort (analog renderReviewCard)
        let sentenceHtml = "";
        if (c.sentence && c.surfaceForm) {
          const isSameForm = c.surfaceForm.toLowerCase() === c.lemma.toLowerCase();
          const re = new RegExp("\\b(" + escapeRegex(c.surfaceForm) + ")\\b", "i");
          const highlighted = escapeHtml(c.sentence).replace(re, isSameForm
            ? '<strong class="hl-lemma">' + escapeHtml(c.surfaceForm) + '</strong>'
            : '<strong class="hl-lemma">' + escapeHtml(c.surfaceForm) + '</strong><span class="hl-surface"> (' + escapeHtml(c.lemma) + ')</span>');
          sentenceHtml = '<div class="vocab-sentence">' + highlighted + '</div>';
        } else {
          sentenceHtml = '<div class="vocab-lemma">' + escapeHtml(c.lemma) + '</div>';
        }

        reviewCard.innerHTML =
          '<h2>🎓 Karte <span class="counter" style="float:right;font-size:0.85rem">' + (posInDeck + 1) + ' / ' + total + '</span></h2>' +
          '<div class="nav-buttons" style="margin-top:0.5rem">' +
            '<button class="grade-btn" id="detail-prev-btn"' + (posInDeck <= 0 ? ' disabled' : '') + '>‹ Zurück</button>' +
            '<button class="grade-btn" id="detail-next-btn"' + (posInDeck >= total - 1 ? ' disabled' : '') + '>Weiter ›</button>' +
          '</div>' +
          sentenceHtml +
          (c.pos ? '<div class="vocab-pos" style="margin-top:0.5rem">' + escapeHtml(c.pos) + '</div>' : '') +
          (c.sentence_en ? '<div class="vocab-en-sentence">' + escapeHtml(c.sentence_en) + '</div>' : '') +
          (c.gloss ? '<div class="vocab-gloss">' + escapeHtml(c.gloss) + '</div>' : '') +
          '<div class="detail-stats">' +
            '<span>×' + (c.reps || 0) + ' geübt</span>' +
            '<span>' + dueText + '</span>' +
            '<span>Lang: ' + escapeHtml(c.lang || '?') + '</span>' +
          '</div>' +
          '<div class="detail-buttons">' +
            '<button class="grade-btn" id="detail-del-btn">🗑 Löschen</button>' +
            '<button class="grade-btn primary" id="detail-learn-btn">📖 Lernen</button>' +
            (c.lang === "es" ? '<button class="grade-btn" id="detail-syn-btn" title="Synonym live per GLM">🔁 Synonym</button>' : '') +
          '</div>' +
          '<button class="close-review" id="detail-back-btn">← Zurück zur Liste</button>';

        document.getElementById("detail-del-btn").addEventListener("click", function () {
          if (confirm("„" + c.lemma + "\" aus dem Deck löschen?")) {
            removeCard(c.lemma);
            renderReviewDone();
          }
        });
        // Vor/Zurück im Detail-View: wechselt zur vorherigen/nächsten Karte der Liste
        const prevBtn = document.getElementById("detail-prev-btn");
        const nextBtn = document.getElementById("detail-next-btn");
        if (prevBtn && !prevBtn.disabled) {
          prevBtn.addEventListener("click", function () {
            if (posInDeck > 0) renderReviewDetail(allCards[posInDeck - 1].lemma);
          });
        }
        if (nextBtn && !nextBtn.disabled) {
          nextBtn.addEventListener("click", function () {
            if (posInDeck < total - 1) renderReviewDetail(allCards[posInDeck + 1].lemma);
          });
        }
        document.getElementById("detail-learn-btn").addEventListener("click", function () {
          // Review-Modus mit dieser Karte starten: Queue = diese Karte + alle fälligen
          const dueCards = getDueCards();
          const others = dueCards.filter(x => x.lemma !== c.lemma);
          reviewQueue = [c].concat(others);
          reviewPos = 0;
          renderReviewCard();
        });
        const synBtn = document.getElementById("detail-syn-btn");
        if (synBtn) synBtn.addEventListener("click", function () { fetchSynonym(c.lemma); });
        document.getElementById("detail-back-btn").addEventListener("click", renderReviewDone);
      }
      function renderReviewCard() {
        if (reviewPos >= reviewQueue.length) {
          // alle geschafft — zeige auch die Deck-Verwaltung
          renderReviewDone();
          return;
        }
        const c = reviewQueue[reviewPos];
        const total = reviewQueue.length;

        // Spanischer Satz mit hervorgehobenem Lernwort (oder Lemma als Fallback)
        let esHtml;
        if (c.sentence && c.surfaceForm) {
          const surfaceLc = c.surfaceForm.toLowerCase();
          const lemmaLc = c.lemma.toLowerCase();
          const isSameForm = surfaceLc === lemmaLc;
          const re = new RegExp("\\b(" + escapeRegex(c.surfaceForm) + ")\\b", "i");
          const highlighted = escapeHtml(c.sentence).replace(re, isSameForm
            ? '<strong class="hl-lemma">' + escapeHtml(c.surfaceForm) + '</strong>'
            : '<strong class="hl-lemma">' + escapeHtml(c.surfaceForm) + '</strong><span class="hl-surface"> (' + escapeHtml(c.lemma) + ')</span>');
          esHtml = '<div class="vocab-sentence">' + highlighted + '</div>';
        } else {
          esHtml = '<div class="vocab-lemma">' + escapeHtml(c.lemma) + '</div>';
        }

        // Bewertungs-Buttons
        const currentInterval = c.interval_hours || 0;
        const newDouble = Math.max(currentInterval * 2, 24);

        const cardHtml =
          '<h2>🎓 Üben <button class="card-delete-btn" id="card-delete-btn" title="Diese Karte löschen">🗑</button></h2>' +
          '<p class="counter">Karte ' + (reviewPos + 1) + ' / ' + total + '</p>' +
          '<div class="card-front-row">' +
            esHtml +
            '<button class="card-tts-btn" id="card-tts-btn" title="Satz vorlesen">🔊</button>' +
          '</div>' +
          (c.pos ? '<div class="vocab-pos" style="margin-top:0.5rem">' + escapeHtml(c.pos) + '</div>' : '') +
          (c.sentence_en ? '<div class="vocab-en-sentence">' + escapeHtml(c.sentence_en) + '</div>' : '') +
          (c.gloss ? '<div class="vocab-gloss">' + escapeHtml(c.gloss) + '</div>' : '') +
          '<div class="grade-buttons">' +
            '<button class="grade-btn" data-interval="0.5">🔄 ½ h</button>' +
            '<button class="grade-btn" data-interval="24">1 Tag</button>' +
            '<button class="grade-btn primary" data-interval="' + newDouble + '">2× (' + intervalLabel(newDouble) + ')</button>' +
          '</div>';
        reviewCard.innerHTML = cardHtml;

        document.getElementById("card-delete-btn").addEventListener("click", function () {
          if (confirm("„" + c.lemma + "\" aus dem Deck löschen?")) {
            removeCard(c.lemma);
            reviewQueue.splice(reviewPos, 1);
            renderReviewCard();
          }
        });
        document.getElementById("card-tts-btn").addEventListener("click", function () {
          const text = (c.sentence && c.surfaceForm) ? c.sentence : c.lemma;
          playCardText(text, c.lang || "es");
        });
        const btns = reviewCard.querySelectorAll(".grade-btn[data-interval]");
        for (const b of btns) {
          b.addEventListener("click", function () {
            const newI = parseFloat(b.getAttribute("data-interval"));
            gradeCard(c.lemma, newI);
            reviewPos++;
            renderReviewCard();
          });
        }
        // Autoplay: wenn aktiviert, Satz automatisch beim Kartenwechsel vorlesen
        if (reviewAutoplay) {
          setTimeout(function () {
            const text = (c.sentence && c.surfaceForm) ? c.sentence : c.lemma;
            playCardText(text, c.lang || "es");
          }, 300);
        }
      }
      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
      }

      reviewBtnEl.addEventListener("click", openReview);

      function setLevel(lvl) {
        level = lvl;
        Array.prototype.forEach.call(levelsEl.children, function (b) {
          b.classList.toggle("active", b.dataset.lvl === lvl);
        });
        stopTTS();
        render();
        saveProgress();
        checkForUpdate();
      }

      function go(delta) {
        const next = idx + delta;
        if (next < 0 || next >= chunks.length) return;
        idx = next;
        render();
        saveProgress();
        checkForUpdate();  // beim Seitenwechsel nach neuer Version schauen
      }

      // ─── Update-Check: vergleicht lokale VERSION mit library.json.version ───
      // Triggert bei: Seitenwechsel, Level-Wechsel, und alle 5 Min.
      let lastUpdateCheck = 0;
      let updateBannerShown = false;
      function checkForUpdate(force) {
        // Throttle: höchstens alle 60s prüfen (außer force)
        const now = Date.now();
        if (!force && now - lastUpdateCheck < 60000) return;
        if (updateBannerShown) return;  // Banner schon da → nicht nochmal prüfen
        lastUpdateCheck = now;
        fetch("library.json?v=" + now)
          .then(r => r.ok ? r.json() : null)
          .then(j => {
            if (!j || !j.version) return;
            if (j.version !== VERSION) showUpdateBanner(j.version);
          })
          .catch(() => {});  // stiller Fehlschlag (Offline, Netz)
      }
      function showUpdateBanner(newVersion) {
        if (updateBannerShown) return;
        updateBannerShown = true;
        const banner = document.createElement("div");
        banner.id = "update-banner";
        banner.innerHTML =
          '<span>📦 Neue Version ' + escapeHtml(newVersion) + '</span>' +
          '<button id="update-refresh-btn">Aktualisieren</button>' +
          '<button id="update-dismiss-btn" title="Später">✕</button>';
        document.body.appendChild(banner);
        document.getElementById("update-refresh-btn").addEventListener("click", function () {
          location.reload();  // hard reload, holt die neue index.html
        });
        document.getElementById("update-dismiss-btn").addEventListener("click", function () {
          banner.remove();
          // Banner bleibt weg für diese Session (updateBannerShown bleibt true)
        });
      }
      // Update-Check auch periodisch (alle 5 Min) und beim Levelwechsel
      setInterval(function () { checkForUpdate(true); }, 5 * 60 * 1000);

      // Progress speichern, aber nicht bei jeder Aktion feuern (entlastet die API)
      let progressTimer = null;
      function saveProgress() {
        if (!bookId) return;
        // Immer lokal sichern (Fallback)
        localStorage.setItem("er2_" + bookId + "_pos", JSON.stringify({ idx: idx, level: level }));
        // Debounced ans API schicken (optional)
        if (progressTimer) clearTimeout(progressTimer);
        progressTimer = setTimeout(function () {
          apiPost("/api/progress", { book_id: bookId, chunk_index: idx, level: level })
            .catch(function () { /* Progress ist optional */ });
        }, 1500);
      }

      function wrapWords(text) {
        const regex = book && book.word_regex ? new RegExp(book.word_regex, "g") : /[А-Яа-яЁё]+/g;
        return text.replace(regex, function (w) { return '<span class="word">' + w + "</span>"; });
      }

      function render() {
        const p = chunks[idx];
        if (!p) return;
        const ref = p.chapter
          ? p.chapter + "  ·  Absatz " + (idx + 1) + " / " + chunks.length
          : "Absatz " + (idx + 1) + " / " + chunks.length;
        nrEl.textContent = ref;

        if (level === "original") {
          textEl.className = "chunk-text";
          textEl.innerHTML = wrapWords(p.original);
        } else if (level === "EN" || level === "EN-A1") {
          // Englische Übersetzung: als Klartext ohne anklickbare Wörter (kein Wörterbuch auf EN)
          const val = p[level];
          if (val && val.trim()) {
            textEl.className = "chunk-text";
            textEl.textContent = val;  // textContent = kein HTML, keine Wraps
          } else {
            textEl.className = "placeholder";
            textEl.innerHTML = '<span class="icon">📖</span>Übersetzung noch nicht generiert.<br><span style="font-size:0.8rem;color:var(--muted-2)">Für diesen Absatz ist nur Original / A2 verfügbar.</span>';
          }
        } else {
          const val = p[level];
          if (val && val.trim()) {
            // Bereits geladen (Cache oder on-demand)
            textEl.className = "chunk-text";
            textEl.innerHTML = wrapWords(val);
          } else if (p._loaded) {
            // Chunk-Daten wurden schon geladen, Level aber leer → ad-hoc generieren
            renderAdHoc(p, level);
          } else {
            // Chunk-Vereinfachungen on-demand vom Server laden
            loadChunkLevels(p);
          }
        }

        counterEl.innerHTML =
          '<span class="now">' + (idx + 1) + '</span> / ' + chunks.length +
          '<span class="ver">v' + VERSION + '</span>';
        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx === chunks.length - 1;
      }

      // Lädt die Vereinfachungen für einen Chunk on-demand vom Server
      function loadChunkLevels(p) {
        textEl.className = "placeholder";
        textEl.innerHTML =
          '<span class="icon" style="display:inline-block;animation:spin 1s linear infinite">⚙️</span>' +
          'Lade Absatz…';

        fetchWithTimeout(API + "/api/chunk/" + p.id, { headers: { "X-User-Id": userId } }, 15000)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) throw new Error(data.error);
            p.C1 = data.C1 || "";
            p.B2 = data.B2 || "";
            p.B1 = data.B1 || "";
            p.A2 = data.A2 || "";
            p._loaded = true;
            if (chunks[idx].id === p.id) render();
          })
          .catch(function (err) {
            if (chunks[idx].id === p.id) {
              textEl.className = "placeholder";
              textEl.innerHTML =
                '<span class="icon">⚠️</span>' +
                'Fehler beim Laden.' +
                '<br><span style="font-size:0.8rem;color:var(--muted-2)">' + (err.message || "") + '</span>' +
                '<br><br><span style="font-size:0.75rem;color:var(--muted-2)">Nochmal tippen/blättern</span>';
            }
          });
      }

      function renderAdHoc(p, lvl) {
        textEl.className = "placeholder";
        textEl.innerHTML =
          '<span class="icon" style="display:inline-block;animation:spin 1s linear infinite">⚙️</span>' +
          'Generiere <strong>' + lvl + '</strong>-Vereinfachung…' +
          '<br><span style="font-size:0.8rem;color:var(--muted-2)">GLM mit RAG · kann 30s dauern</span>';

        fetchWithTimeout(API + "/api/simplify", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8", "X-User-Id": userId },
          body: JSON.stringify({ chunk_id: p.id, level: lvl }),
        }, 60000)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) throw new Error(data.error);
            const text = data.simplified.trim();
            p[lvl] = text;
            if (chunks[idx].id === p.id && level === lvl) {
              textEl.className = "chunk-text";
              textEl.innerHTML = wrapWords(text);
            }
          })
          .catch(function (err) {
            if (chunks[idx].id === p.id && level === lvl) {
              textEl.className = "placeholder";
              const msg = err.message === "Timeout" ? "Zeitüberschreitung." : (err.message || "Fehler");
              textEl.innerHTML =
                '<span class="icon">⚠️</span>' +
                'Fehler bei der Generierung.' +
                '<br><span style="font-size:0.8rem;color:var(--muted-2)">' + msg + '</span>' +
                '<br><br><span style="font-size:0.75rem;color:var(--muted-2)">Nochmal auf ' + lvl + ' tippen</span>';
            }
          });
      }

      // ─── Synonym-Funktion (live GLM, Test der Kette WebApp→Worker→GLM) ───
      function showSynPopup(html) {
        synPopup.innerHTML = html;
        synOverlay.classList.remove("hidden");
      }
      function hideSynPopup() { synOverlay.classList.add("hidden"); }
      // Hintergrund-Tap und Schließen-X (delegiert, da Inhalt pro Aufruf neu gesetzt)
      synOverlay.addEventListener("click", function (e) {
        if (e.target === synOverlay || e.target.classList.contains("syn-close")) hideSynPopup();
      });
      // Rang-Badge-HTML: "Rang 1234 · B2" oder "Rang unbekannt"
      function synRankBadge(rank, cefr) {
        if (rank == null) return '<span class="rank">Rang unbekannt</span>';
        return '<span class="rank">Rang ' + rank + (cefr ? ' · ' + cefr : '') + '</span>';
      }
      function fetchSynonym(lemma) {
        // Sofort Spinner zeigen
        showSynPopup(
          '<div class="syn-head"><span class="syn-title">Synonym</span>' +
            '<button class="syn-close" title="Schließen">✕</button></div>' +
          '<div class="syn-loading">' +
            '<span class="icon">⚙️</span><br>' +
            'Suche einfacheres Synonym für „<strong>' + escapeHtml(lemma) + '</strong>"…' +
            '<br><span class="hint">GLM live · kann 20s dauern</span>' +
          '</div>'
        );
        fetchWithTimeout(API + "/api/synonym", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8", "X-User-Id": userId },
          body: JSON.stringify({ lemma: lemma, lang: "es" }),
        }, 60000)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) throw new Error(data.error);
            // Originalrang clientseitig ergänzen, falls der Worker ihn nicht liefert
            // (für 'es' steht keine words-Tabelle in D1 → Rang aus es_ranks.json).
            if (data.orig_rank == null) {
              return ensureRankMap().then(function () {
                const r = rankForLemma(lemma);
                if (r != null) data.orig_rank = r;
                return data;
              });
            }
            return data;
          })
          .then(function (data) {
            const syn = (data.synonym || "").trim();
            let body;
            if (!syn) {
              // Kein passendes Synonym gefunden
              const origInfo = data.orig_rank != null
                ? ' (Original: Rang ' + data.orig_rank + (data.orig_cefr ? ' · ' + data.orig_cefr : '') + ')'
                : '';
              body =
                '<div class="syn-word">' + escapeHtml(lemma) + '</div>' +
                '<div class="syn-empty">Kein einfacheres Synonym gefunden, das die Bedeutung erhält.' + origInfo + '</div>';
            } else {
              const easier = (data.syn_rank != null && data.orig_rank != null && data.syn_rank < data.orig_rank);
              body =
                '<div class="syn-word">' + escapeHtml(lemma) + '</div>' +
                '<div class="syn-arrow">↓ einfacheres Synonym</div>' +
                '<div class="syn-word">' + escapeHtml(syn) + '</div>' +
                (data.en_syn ? '<div class="syn-gloss">' + escapeHtml(data.en_syn) + '</div>' : '') +
                '<div class="syn-meta">' +
                  (data.semantic_pct != null ? '<span class="badge">' + data.semantic_pct + '% Bedeutung</span>' : '') +
                  (easier ? '<span class="badge">✓ häufiger</span>' : '') +
                  synRankBadge(data.orig_rank, data.orig_cefr) +
                  (data.syn_rank != null ? '<span class="rank">→ Rang ' + data.syn_rank + (data.syn_cefr ? ' · ' + data.syn_cefr : '') + '</span>' : '') +
                '</div>' +
                (data.note ? '<div class="syn-note">' + escapeHtml(data.note) + '</div>' : '');
            }
            showSynPopup(
              '<div class="syn-head"><span class="syn-title">Synonym · live GLM</span>' +
                '<button class="syn-close" title="Schließen">✕</button></div>' +
              body
            );
          })
          .catch(function (err) {
            const msg = err.message === "Timeout" ? "Zeitüberschreitung." : (err.message || "Fehler");
            showSynPopup(
              '<div class="syn-head"><span class="syn-title">Synonym</span>' +
                '<button class="syn-close" title="Schließen">✕</button></div>' +
              '<div class="syn-error">' +
                '<span class="icon">⚠️</span> Fehler bei der Synonym-Suche.' +
                '<span class="msg">' + escapeHtml(msg) + '</span>' +
                '<span class="retry">Nochmal auf 🔁 tippen</span>' +
              '</div>'
            );
          });
      }

      prevBtn.addEventListener("click", function () { stopTTS(); go(-1); });
      nextBtn.addEventListener("click", function () { stopTTS(); go(1); });
      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft") go(-1);
        else if (e.key === "ArrowRight") go(1);
      });
      let touchStartX = null, touchStartY = null, swipeActive = false;
      document.addEventListener("touchstart", function (e) {
        touchStartX = e.changedTouches[0].clientX; touchStartY = e.changedTouches[0].clientY; swipeActive = true;
      }, { passive: true });
      document.addEventListener("touchmove", function (e) {
        if (!swipeActive || touchStartX === null) return;
        const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
        const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
        if (dy > dx && dy > 12) swipeActive = false;
      }, { passive: true });
      document.addEventListener("touchend", function (e) {
        if (!swipeActive || touchStartX === null) { swipeActive = false; return; }
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 60) { stopTTS(); go(dx < 0 ? 1 : -1); }
        swipeActive = false; touchStartX = null;
      }, { passive: true });

      // Wort-Übersetzung (gleiche Logik wie SimpleReader)
      const dictCache = {};
      // Frequenzränge (lazy geladen, sprachbewusst). Pro Sprache eine Lemma-Map
      // und eine Form-Map, beide aus OpenSubtitles (Top-100k), via spaCy-lg
      // lemmatisiert bzw. roh. Totale pro Sprache fest (Listen aendern sich nicht).
      const RANK_FILES = {
        es: { lemma: "es_ranks.json", form: "es_form_ranks.json", lemmaTotal: 67778, formTotal: 100000 },
        de: { lemma: "de_ranks.json", form: "de_form_ranks.json", lemmaTotal: 78894, formTotal: 100000 },
      };
      let rankMap = null;
      let rankMapLoading = null;
      function rankFileConf() { return RANK_FILES[wiktLang()] || null; }
      async function ensureRankMap() {
        if (rankMap) return rankMap;
        if (rankMapLoading) return rankMapLoading;
        const conf = rankFileConf();
        if (!conf) return rankMap || {};
        rankMapLoading = fetch(conf.lemma + "?v=" + VERSION)
          .then(r => r.ok ? r.json() : {})
          .then(j => { rankMap = j; return j; })
          .catch(() => { rankMap = {}; return {}; });
        return rankMapLoading;
      }
      function rankForLemma(lemma) {
        if (!rankMap || !lemma) return null;
        // Deutsch: case-sensitiv (Bruder != bruder), dann lowercase-Fallback.
        // Spanisch etc.: lowercase (Grossschreibung dort nicht grammatikalisch).
        if (wiktLang() === "de") {
          return rankMap[lemma] || rankMap[lemma.toLowerCase()] || null;
        }
        return rankMap[lemma.toLowerCase()] || null;
      }
      // Form-Rang (gebeugte Form, OpenSubtitles). Komplementaer zum Lemma-Rang:
      // spiegelt Haeufigkeit der KONKRETEN Beugung, nicht des Lemmas.
      let formRankMap = null;
      let formRankMapLoading = null;
      async function ensureFormRankMap() {
        if (formRankMap) return formRankMap;
        if (formRankMapLoading) return formRankMapLoading;
        const conf = rankFileConf();
        if (!conf) return formRankMap || {};
        formRankMapLoading = fetch(conf.form + "?v=" + VERSION)
          .then(r => r.ok ? r.json() : {})
          .then(j => { formRankMap = j; return j; })
          .catch(() => { formRankMap = {}; return {}; });
        return formRankMapLoading;
      }
      function rankForForm(form) {
        if (!formRankMap || !form) return null;
        return formRankMap[form.toLowerCase()] || null;
      }
      // Satz-Map (nur spanisch, für Vokabeltrainer): chunkId → [{es, en}]
      let sentenceMap = null;
      let sentenceMapLoading = null;
      async function ensureSentenceMap() {
        if (sentenceMap) return sentenceMap;
        if (sentenceMapLoading) return sentenceMapLoading;
        sentenceMapLoading = fetch("book-2-sentences.json?v=" + VERSION)
          .then(r => r.ok ? r.json() : [])
          .then(arr => {
            sentenceMap = {};
            for (const e of arr) sentenceMap[e.chunk_id] = e.sentences || [];
            return sentenceMap;
          })
          .catch(() => { sentenceMap = {}; return {}; });
        return sentenceMapLoading;
      }
      // Für ein Lemma + chunkId: gibt {es, en} des Satzes zurück, der das Lemma enthält.
      function findSentenceWithTranslation(lemma, chunkId) {
        if (!sentenceMap || !lemma || !chunkId) return null;
        const sentences = sentenceMap[chunkId];
        if (!sentences || !sentences.length) return null;
        const lemmaLc = lemma.toLowerCase();
        const stem = lemmaStem(lemmaLc);
        const re = new RegExp("\\b(" + escapeRegex(stem) + "[a-záéíóúñü]*)\\b", "i");
        for (const s of sentences) {
          if (s.es && re.test(s.es)) return s;
        }
        return null;
      }
      function showPopup(html, x, y) {
        dictPopup.innerHTML = html;
        dictPopup.classList.add("visible");
        const pw = dictPopup.offsetWidth || 280, ph = dictPopup.offsetHeight || 100;
        let left = Math.max(10, Math.min(x - pw / 2, window.innerWidth - pw - 10));
        let top = y - ph - 16; if (top < 10) top = y + 30;
        dictPopup.style.left = left + "px"; dictPopup.style.top = top + "px";
      }
      function hidePopup() { dictPopup.classList.remove("visible"); }
      function stripTags(html) { const d = document.createElement("div"); d.innerHTML = html; return d.textContent || ""; }
      // Wiktionary-Sprachsektion dynamisch aus dem Buch (Default 'ru' für Abwärtskompatibilität)
      function wiktLang() { return (book && book.wiktionary_lang) || "ru"; }
      // Strip-Regex aus dem Buch ableiten: behalte genau die Zeichen, die in word_regex erlaubt sind.
      // Wir bauen sie aus den Buchstaben-Klassen, die in word_regex vorkommen.
      function keepCharRegex() {
        // Statisch pro Sprache (schnell genug): wir übersetzen die wenigen bekannten Regexes.
        const wr = (book && book.word_regex) || "";
        if (/ÄÖÜäöüß/.test(wr)) return /[^A-Za-zÄÖÜäöüß]/g;             // Deutsch
        if (/ÁÉÍÓÚÜáéíóúüÑñ/.test(wr)) return /[^A-Za-zÁÉÍÓÚÜáéíóúüÑñ]/g;  // Spanisch
        return /[^А-Яа-яЁё]/g;  // Russisch (Default)
      }
      function extractLemma(html, lang) {
        // „of <Wort>"-Pattern. Wort-Zeichenklasse hängt von der Sprache ab.
        // Negative Lookahead: ignoriert Artikel (of a/the/an …), die fälschlich
        // als Lemma matched haben (z. B. „handrail … of a staircase" → „a").
        if (lang === "de") {
          const m = html.match(/of\s+(?![Tt]he\b|[Aa]n?\b)([A-Za-zÄÖÜäöüß]+)/);
          return m ? m[1] : null;
        }
        if (lang === "es") {
          const m = html.match(/of\s+(?![Tt]he\b|[Aa]n?\b)([A-Za-zÁÉÍÓÚÜáéíóúüÑñ]+)/);
          return m ? m[1] : null;
        }
        // Russisch: Artikel gibt es nicht, Lookahead nur aus Konsistenz.
        const m = html.match(/of\s+(?![Tt]he\b|[Aa]n?\b)([А-Яа-яЁё][А-Яа-яЁё]*(?:́[А-Яа-яЁё]+)?)/);
        return m ? m[1] : null;
      }
      function stripAccents(w) { return w.replace(/\u0301/g, ""); }

      async function lookUp(word, x, y) {
        const lang = wiktLang();
        word = word.trim().replace(keepCharRegex(), "");
        if (!word || word.length < 2) return;
        showPopup('<div class="loading">Suche „' + word + '"…</div>', x, y);
        // Frequenzränge lazy laden (parallel, blockiert den LookUp nicht).
        // Nur für Sprachen mit Frequenzliste (es, de); sonst kein-op.
        if (rankFileConf()) { ensureRankMap(); ensureFormRankMap(); }
        // Cache: sowohl Originalform als auch lowercase-Variante prüfen.
        // (Wörter am Satzanfang sind großgeschrieben, Wiktionary hat Lemmata aber klein.)
        if (dictCache[word]) { renderDict(word, dictCache[word], x, y); return; }
        const wordLc = word.toLowerCase();
        if (word !== wordLc && dictCache[wordLc]) {
          dictCache[word] = dictCache[wordLc];
          renderDict(word, dictCache[word], x, y);
          return;
        }
        // Versuch 1: Wort wie angeklickt (für Eigennamen, die im Wiktionary groß stehen).
        let entry = await lookUpOne(word, lang);
        // Versuch 2 (falls Versuch 1 erfolglos und Wort war groß): lowercase-Variante.
        // Betrifft Wörter am Satzanfang, die als Lemma klein im Wiktionary stehen.
        if (!entry && word !== wordLc) {
          entry = await lookUpOne(wordLc, lang);
        }
        if (!entry) entry = { notFound: true };
        // Rang aus der Frequenzliste dazuschreiben (falls geladen und Lemma bekannt).
        if (entry.lemma && rankMap) {
          const r = rankForLemma(entry.lemma);
          if (r != null) entry.rank = r;
        } else if (entry.lemma && rankFileConf()) {
          // Map lädt noch (erster Klick) — kurz warten, sonst würde fälschlich
          // "-" angezeigt obwohl das Wort in der Liste ist.
          await ensureRankMap();
          const r = rankForLemma(entry.lemma);
          if (r != null) entry.rank = r;
        }
        // Form-Rang dazuschreiben (gebeugte Form, OpenSubtitles).
        if (formRankMap) {
          const fr = rankForForm(word);
          if (fr != null) entry.filmRank = fr;
        } else if (rankFileConf()) {
          // Map lädt noch (erster Klick) — kurz warten, sonst würde fälschlich
          // "-" angezeigt obwohl das Wort in der Liste ist.
          await ensureFormRankMap();
          const fr = rankForForm(word);
          if (fr != null) entry.filmRank = fr;
        }
        dictCache[word] = entry;
        if (entry.foundLemma) dictCache[entry.foundLemma.toLowerCase()] = entry;  // lowercase-Variante auch cachen
        renderDict(word, entry, x, y);
      }

      // lookUpOne: ein einzelnes Wort gegen Wiktionary abfragen.
      // Liefert einen Entry {lemma, pos, gloss, inflected, foundLemma} oder null bei nicht gefunden.
      async function lookUpOne(word, lang) {
        try {
          const res = await fetch("https://en.wiktionary.org/api/rest_v1/page/definition/" + encodeURIComponent(word));
          if (res.status === 404) return null;
          if (!res.ok) throw new Error("HTTP " + res.status);
          const json = await res.json();
          if (!json[lang] || !json[lang].length) return null;
          const section = json[lang][0], def0 = section.definitions[0], defText = stripTags(def0.definition);
          const lemma = extractLemma(defText, lang);
          let gloss = defText, displayLemma = word;
          if (lemma && lemma.toLowerCase() !== word.toLowerCase()) {
            displayLemma = lemma;
            const lemmaClean = stripAccents(lemma);
            try {
              const res2 = await fetch("https://en.wiktionary.org/api/rest_v1/page/definition/" + encodeURIComponent(lemmaClean));
              if (res2.ok) {
                const j2 = await res2.json();
                if (j2[lang] && j2[lang][0] && j2[lang][0].definitions[0]) gloss = stripTags(j2[lang][0].definitions[0].definition);
              }
            } catch (e) {}
          }
          return {
            lemma: displayLemma,
            pos: section.partOfSpeech,
            gloss,
            inflected: (lemma && lemma.toLowerCase() !== word.toLowerCase()) ? word : null,
            foundLemma: displayLemma,
          };
        } catch (e) {
          return { error: true };
        }
      }
      function renderDict(word, entry, x, y) {
        let html;
        if (entry.notFound) html = '<div class="dw"><span class="lemma">' + word + '</span></div><div class="err">Nicht im Wörterbuch.</div>';
        else if (entry.error) html = '<div class="err">Verbindungsfehler.</div>';
        else {
          html = '<div class="dw"><span class="lemma">' + entry.lemma + '</span>';
          if (entry.inflected) html += '<span class="inflected">(von „' + entry.inflected + '")</span>';
          // Rang-Badges (nur für Sprachen mit Frequenzliste: es, de).
          // Format "Label: rang / total" mit 1000er-Punkt; "-" wenn nicht in Liste.
          // Beide Badges aus Top-100k OpenSubtitles 2018 — einmal über spaCy-lg
          // lemmatisiert (Lemma), einmal als rohe Beugung (Form). Totale aus RANK_FILES.
          const rc = rankFileConf();
          if (rc) {
            const fmt = n => (n == null ? "-" : n.toLocaleString("de-DE"));
            html += '<span class="rank-badge">OpenSubtitles Rang (Lemma): ' + fmt(entry.rank) + '/' + fmt(rc.lemmaTotal) + '</span>';
            html += '<span class="rank-badge film-badge">OpenSubtitles Rang (Form): ' + fmt(entry.filmRank) + '/' + fmt(rc.formTotal) + '</span>';
          }
          html += '</div>';
          if (entry.pos) html += '<div class="pos">' + entry.pos + '</div>';
          html += '<div class="gloss">' + entry.gloss + '</div>';
          // Lernen-Button: nur im Happy-Path. Wenn schon im Deck → Status + Entfernen.
          const inDeck = loadDeck()[entry.lemma];
          if (inDeck) {
            html += '<div class="deck-status"><span class="added-mark">✓ Im Deck</span>' +
                    '<button class="remove-btn" data-remove-lemma="' + entry.lemma.replace(/"/g, '&quot;') + '">Entfernen</button></div>';
          } else {
            html += '<button class="learn-btn" data-lemma="' + entry.lemma.replace(/"/g, '&quot;') + '">+ Lernen</button>';
          }
        }
        html += '<div class="close-hint">Tippe daneben zum Schließen</div>';
        showPopup(html, x, y);
      }
      textEl.addEventListener("click", function (e) {
        const wordEl = e.target.closest(".word");
        if (!wordEl) { hidePopup(); return; }
        const rect = wordEl.getBoundingClientRect();
        lookUp(wordEl.textContent.trim(), rect.left + rect.width / 2, rect.top);
      });
      document.addEventListener("click", function (e) {
        if (!dictPopup.contains(e.target) && !e.target.closest(".word")) hidePopup();
      });
      // Lernen-Button im Popup (delegated, da Popup-HTML bei jedem lookUp neu gebaut wird)
      dictPopup.addEventListener("click", async function (e) {
        const btn = e.target.closest(".learn-btn");
        if (!btn || btn.disabled) return;
        const lemma = btn.getAttribute("data-lemma");
        const deck = loadDeck();
        const entry = dictCache[lemma] || Object.values(dictCache).find(en => en && en.lemma === lemma);
        // Fallback: falls nicht im Cache (sollte nicht passieren), aus Popup-DOM rekonstruieren
        let cardEntry = entry;
        if (!cardEntry) {
          const glossEl = dictPopup.querySelector(".gloss");
          const posEl = dictPopup.querySelector(".pos");
          const inflEl = dictPopup.querySelector(".inflected");
          cardEntry = {
            lemma: lemma,
            gloss: glossEl ? glossEl.textContent : "",
            pos: posEl ? posEl.textContent : "",
            inflected: inflEl ? inflEl.textContent.replace(/^\(von „|“\)$/g, "").trim() : null,
          };
        }
        // Für spanische Bücher: Satz-Map vor dem Speichern abwarten (sonst Race-Condition)
