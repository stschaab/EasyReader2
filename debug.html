<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EasyReader2 Debug</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #1a1f2b; color: #e8eaed; padding: 1.5rem; max-width: 600px; margin: 0 auto;
         line-height: 1.5; }
  h1 { font-size: 1.1rem; margin: 0 0 1rem; color: #9aa0aa; font-weight: 600; }
  .row { background: #232a38; border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 0.6rem;
         word-break: break-all; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9rem; }
  .label { color: #9aa0aa; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
           display: block; margin-bottom: 0.3rem; font-family: -apple-system, sans-serif; }
  .value { color: #8ab4f8; }
  .empty { color: #6b717b; font-style: italic; }
  .hint { color: #9aa0aa; font-size: 0.8rem; margin-top: 1rem; }
  button { background: #8ab4f8; color: #1a1f2b; border: none; border-radius: 6px;
           padding: 0.5rem 1rem; font-size: 0.9rem; cursor: pointer; margin-top: 0.5rem; }
</style>
</head>
<body>
  <h1>🔍 EasyReader2 — LocalStorage Debug</h1>

  <div class="row">
    <span class="label">userId</span>
    <span class="value" id="userId">(leer)</span>
  </div>

  <div class="row">
    <span class="label">Deck (Anzahl Karten lokal)</span>
    <span class="value" id="deckCount">0</span>
  </div>

  <div class="row">
    <span class="label">Migration durchgeführt?</span>
    <span class="value" id="migrated">nein</span>
  </div>

  <div class="row">
    <span class="label">App-Version</span>
    <span class="value" id="version">?</span>
  </div>

  <p class="hint">
    Bitte kopiere die <strong>userId</strong> und schicke sie an mich (Stefan → Chat).
    Gehe dazu lang auf den userId-Wert und wähle „Kopieren".
  </p>

  <script>
    const userId = localStorage.getItem("easyreader2.userId");
    document.getElementById("userId").textContent = userId || "(leer)";

    let deckCount = 0;
    try {
      const deck = JSON.parse(localStorage.getItem("er2_deck") || "{}");
      deckCount = Object.keys(deck).length;
    } catch (e) {}
    document.getElementById("deckCount").textContent = deckCount;

    const migrated = localStorage.getItem("er2_deck_migrated");
    document.getElementById("migrated").textContent = migrated ? "ja" : "nein";

    // Versuche die VERSION aus der index.html zu erraten — wir wissen sie nicht exakt,
    // aber wir können sie via fetch holen. Fürs Debuggen reicht der LocalStorage-Stand.
    document.getElementById("version").textContent = "v7.29 (oder neuer)";
  </script>
</body>
</html>
